<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Detail - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #eef2f8;
            --surface: #ffffff;
            --text: #1f2f4f;
            --muted: #5b6d8a;
            --accent1: #3a6ff8;
            --accent2: #8e52f8;
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
            --radius: 18px;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 18px 14px 36px;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            border-radius: var(--radius);
            box-shadow: var(--shadow-strong);
            padding: 28px;
            animation: fadeInUp 0.45s ease;
        }

        .gallery-main {
            position: relative;
            height: 380px;
            overflow: hidden;
            border-radius: 18px;
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            background: linear-gradient(135deg, #f9faff, #f5f9ff);
            box-shadow: var(--shadow-strong);
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            background: rgba(58, 111, 248, 0.8);
            cursor: pointer;
            z-index: 2;
            transition: box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .gallery-arrow:hover {
            background: rgba(58, 111, 248, 1);
            box-shadow: 0 10px 28px rgba(58, 111, 248, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .gallery-arrow.prev {
            left: 14px;
        }

        .gallery-arrow.next {
            right: 14px;
        }

        .thumb-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .thumb-row img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .thumb-row img:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 12px rgba(58, 111, 248, 0.2);
        }

        .thumb-row img.active {
            border-color: var(--accent1);
            transform: scale(1.06);
            box-shadow: 0 6px 16px rgba(58, 111, 248, 0.3);
        }

        .detail-title {
            margin: 0 0 14px;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(110deg, var(--accent1), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 12px 0;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 12px;
        }

        .meta span {
            background: linear-gradient(135deg, #f9faff, #f5f9ff);
            border: 1px solid rgba(58, 111, 248, 0.18);
            border-radius: 12px;
            padding: 8px 12px;
            font-weight: 600;
        }

        .split {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .details-list {
            list-style: none;
            padding: 0;
            margin: 14px 0 0;
        }

        .details-list li {
            margin-bottom: 10px;
            font-size: 0.96rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(74, 99, 142, 0.1);
            color: var(--text);
        }

        .description {
            margin-top: 18px;
            color: var(--muted);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }        
        /* ===== NAVBAR FIXED POSITIONING ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 81%;
            box-sizing: border-box;
            background: linear-gradient(135deg, rgba(58,111,248,0.08) 0%, rgba(142,82,248,0.06) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.2px solid rgba(58,111,248,0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(58,111,248,0.08), inset 0 1px 1px rgba(255,255,255,0.9);
            padding: 0;
            height: 70px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar:hover {
            box-shadow: 0 12px 40px rgba(58,111,248,0.12), inset 0 1px 1px rgba(255,255,255,0.95);
            border-color: rgba(58,111,248,0.22);
        }

        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1f2d52;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.22s ease;
            flex-shrink: 0;
        }

        .nav-brand:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .nav-brand img {
            height: 46px;
            width: auto;
            object-fit: contain;
        }

        .nav-brand span {
            display: none;
        }

        @media (min-width: 640px) {
            .nav-brand span {
                display: inline;
            }
        }

        .nav-center a {
            text-decoration: none;
            color: #1f2d52;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.4px;
            padding: 10px 18px;
            border-radius: 14px;
            transition: all 0.22s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-center a:hover {
            color: #fff;
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
        }

        #user-greeting {
            color: #1f2d52;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0 12px;
            white-space: nowrap;
        }

        #auth-link {
            padding: 9px 18px;
            background: rgba(58, 111, 248, 0.08);
            color: #1f2f4f;
            border-radius: 12px;
            border: 1px solid rgba(58, 111, 248, 0.15);
            transition: all 0.22s ease;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-block;
        }

        #auth-link:hover {
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
            border-color: #3a6ff8;
        }

        #auth-link.logout-btn {
            background: rgba(209, 40, 69, 0.08);
            color: #d12845;
            border: 1px solid rgba(209, 40, 69, 0.2);
        }

        #auth-link.logout-btn:hover {
            background: #d12845;
            color: #fff;
            border-color: #d12845;
            box-shadow: 0 8px 20px rgba(209, 40, 69, 0.25);
            transform: translateY(-2px);
        }

        #admin-link {
            padding: 9px 18px;
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            box-shadow: 0 6px 20px rgba(58, 111, 248, 0.2);
            transition: all 0.22s ease;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
        }

        #admin-link:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(142, 82, 248, 0.35);
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            transition: all 0.2s ease;
        }

        @media (min-width: 768px) {
            .hamburger {
                display: none;
            }
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: #1f2d52;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Mobile menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, rgba(248, 250, 255, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(200, 210, 230, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            flex-direction: column;
            padding: 16px;
            gap: 8px;
            z-index: 999;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
            animation: slideDown 0.25s ease forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu a {
            display: block;
            padding: 12px 16px;
            text-decoration: none;
            color: #1f2d52;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.22s ease;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(58, 111, 248, 0.1);
        }

        .mobile-menu a:hover {
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(58, 111, 248, 0.2);
            border-color: #3a6ff8;
        }

        #auth-link-mobile {
            padding: 12px 16px;
            background: rgba(58, 111, 248, 0.08);
            border-radius: 12px;
            text-decoration: none;
            color: #1f2d52;
            font-weight: 500;
            transition: all 0.22s ease;
            display: block;
            border: 1px solid rgba(58, 111, 248, 0.15);
        }

        #auth-link-mobile:hover {
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
        }

        #auth-link-mobile.logout-btn {
            background: rgba(209, 40, 69, 0.08);
            color: #d12845;
            border: 1px solid rgba(209, 40, 69, 0.2);
        }

        #auth-link-mobile.logout-btn:hover {
            background: #d12845;
            color: #fff;
            border-color: #d12845;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(209, 40, 69, 0.25);
        }

        #admin-link-mobile {
            display: block;
            padding: 12px 16px;
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            box-shadow: 0 6px 20px rgba(58, 111, 248, 0.15);
            transition: all 0.22s ease;
        }

        #admin-link-mobile:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(142, 82, 248, 0.35);
        }

        @media (max-width: 768px) {
            .nav-center {
                display: none;
            }
        }
    </style>
</head>

        <hr style="border: none; border-top: 1px solid rgba(200, 210, 230, 0.3); margin: 8px 0;">

    <div class="container" style="margin-top: 100px;">

        <div id="error-message" class="card" style="display:none;color:#a13636;background:#fff1f1;border-color:#ecbcbc;"></div>

        <div class="layout" id="vehicle-detail" style="display:none;">
            <div>
                <div class="gallery-main" id="gallery-main">
                    <button class="gallery-arrow prev" id="gallery-prev" aria-label="Previous image">&#10094;</button>
                    <img src="/logo.PNG" alt="Main image">
                    <button class="gallery-arrow next" id="gallery-next" aria-label="Next image">&#10095;</button>
                </div>
                <div class="thumb-row" id="gallery-thumbs"></div>
            </div>
            <div class="card">
                <h1 class="detail-title" id="vehicle-title">Loading...</h1>
                <div class="price" id="vehicle-price">Rs. 0</div>
                <div class="meta" id="vehicle-meta"></div>
                <div class="split">
                    <button class="btn primary" id="contact-btn">📞 Contact Seller</button>
                    <button class="btn secondary" id="leasing-btn">💰 Get Leasing</button>
                </div>
                <ul class="details-list" id="vehicle-info"></ul>
                <p class="description" id="vehicle-description">No additional description available.</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        console.log('📡 Using API URL:', API_BASE_URL);
        const API_URL = API_BASE_URL;
        const PLACEHOLDER_IMAGE = '/logo.PNG';
        const getEl = (id) => document.getElementById(id);

        function getTokenPayload() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
        }

        async function updateNavigation() {
            try {
                let payload = getTokenPayload();
                const authLink = getEl('auth-link');
                const adminLink = getEl('admin-link');
                const myListings = getEl('mylistings-link');
                const userGreeting = getEl('user-greeting');

                if (!payload || (payload.exp && Date.now() >= payload.exp * 1000)) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('userName');
                    if (userGreeting) userGreeting.style.display = 'none';
                    payload = null;
                }

                if (payload && !payload.name) {
                    try {
                        const res = await fetch(`${API_URL}/profile`, {
                            headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
                        });
                        if (res.ok) {
                            const profile = await res.json();
                            if (profile.name) {
                                payload.name = profile.name;
                            }
                        }
                    } catch (err) {
                        console.warn('Failed to fetch profile', err);
                    }
                }

                if (adminLink) {
                    adminLink.style.display = payload?.role === 'admin' ? 'inline-block' : 'none';
                }

                if (payload) {
                    if (myListings) myListings.style.display = 'inline-block';
                    const displayName = payload.name || localStorage.getItem('userName') || payload.email || '';
                    if (userGreeting) {
                        userGreeting.textContent = displayName ? `Hi, ${displayName}` : 'Hi';
                        userGreeting.style.display = 'inline-block';
                    }
                    if (authLink) {
                        authLink.textContent = 'Logout';
                        authLink.classList.add('logout-btn');
                        authLink.href = '#';
                        authLink.onclick = (e) => {
                            e.preventDefault();
                            localStorage.removeItem('token');
                            localStorage.removeItem('userName');
                            location.reload();
                        };
                    }
                } else {
                    if (myListings) myListings.style.display = 'none';
                    if (authLink) {
                        authLink.textContent = 'Login';
                        authLink.classList.remove('logout-btn');
                        authLink.href = 'login.html';
                        authLink.onclick = null;
                    }
                }
                syncMobileAuth();
            } catch (err) {
                console.error('Navigation update error:', err);
            }
        }

        function syncMobileAuth() {
            const desktopAuthLink = getEl('auth-link');
            const mobileAuthLink = getEl('auth-link-mobile');
            if (desktopAuthLink && mobileAuthLink) {
                mobileAuthLink.textContent = desktopAuthLink.textContent;
                mobileAuthLink.href = desktopAuthLink.href;
                mobileAuthLink.onclick = desktopAuthLink.onclick;
                
                if (desktopAuthLink.classList.contains('logout-btn')) {
                    mobileAuthLink.classList.add('logout-btn');
                } else {
                    mobileAuthLink.classList.remove('logout-btn');
                }
            }
        }

        /**
         * Get image URL from vehicle data
         * Images are now stored as Firebase Storage URLs directly
         */
        function getImageUrl(images) {
            try {
                let imageArray = [];
                if (typeof images === 'string') {
                    // Try to parse as JSON array first
                    try {
                        imageArray = JSON.parse(images);
                        // Ensure it's actually an array
                        if (!Array.isArray(imageArray)) {
                            imageArray = [images]; // Treat as single image
                        }
                    } catch (parseError) {
                        // If JSON.parse fails, treat as single image URL
                        imageArray = [images];
                    }
                } else if (Array.isArray(images)) {
                    imageArray = images;
                }
                return (imageArray && imageArray[0]) || PLACEHOLDER_IMAGE;
            } catch (e) {
                console.warn('⚠️ Failed to parse images:', e.message);
                return PLACEHOLDER_IMAGE;
            }
        }

        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        function setError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.style.display = 'block';
            document.getElementById('vehicle-detail').style.display = 'none';
        }

        let detailImages = [];
        let currentImageIndex = 0;

        function setMainGalleryImage(index) {
            if (!detailImages.length) return;
            currentImageIndex = ((index % detailImages.length) + detailImages.length) % detailImages.length;
            const currentSrc = detailImages[currentImageIndex];
            const mainImage = document.querySelector('#gallery-main img');
            mainImage.style.opacity = '0';
            setTimeout(() => {
                mainImage.src = currentSrc;
                mainImage.alt = `Photo ${currentImageIndex + 1}`;
                mainImage.onerror = () => { mainImage.src = '/logo.PNG'; console.warn('⚠️ Image failed to load:', currentSrc); };
                mainImage.style.opacity = '1';
            }, 160);
            const thumbs = document.getElementById('gallery-thumbs');
            thumbs.querySelectorAll('img').forEach((img, i) => img.classList.toggle('active', i === currentImageIndex));
            console.log('Gallery set to image', currentImageIndex + 1, 'of', detailImages.length);
        }

        function renderVehicle(v) {
            if (!v) {
                setError('Vehicle not found');
                return;
            }

            document.getElementById('error-message').style.display = 'none';
            const detailSection = document.getElementById('vehicle-detail');
            detailSection.style.display = 'grid';

            const title = document.getElementById('vehicle-title');
            const price = document.getElementById('vehicle-price');
            const meta = document.getElementById('vehicle-meta');
            const info = document.getElementById('vehicle-info');
            const mainImage = document.querySelector('#gallery-main img');
            const thumbs = document.getElementById('gallery-thumbs');
            const prevBtn = document.getElementById('gallery-prev');
            const nextBtn = document.getElementById('gallery-next');
            const contactBtn = document.getElementById('contact-btn');
            const leasingBtn = document.getElementById('leasing-btn');
            const desc = document.getElementById('vehicle-description');

            title.textContent = v.title || 'Untitled Vehicle';
            price.textContent = `Rs. ${Number(v.price || 0).toLocaleString()}`;
            const location = v.location || 'Unknown';
            meta.innerHTML = `<span>Brand: ${v.brand || '-'}</span><span>Year: ${v.year || '-'}</span><span>Fuel: ${v.fuelType || '-'}</span><span>📍 ${location}</span><span>👁️ ${v.views || 0}</span>`;

            // Firebase Storage URLs are stored as JSON array - parse and use directly
            let detailImagesArray = [];
            if (typeof v.images === 'string' && v.images.trim()) {
                try {
                    const parsed = JSON.parse(v.images);
                    // Ensure it's actually an array
                    if (Array.isArray(parsed)) {
                        detailImagesArray = parsed;
                    } else {
                        // If parsed but not an array, treat as single image
                        detailImagesArray = [v.images];
                    }
                } catch (parseError) {
                    // If JSON.parse fails, treat as single image URL
                    detailImagesArray = [v.images];
                }
            } else if (Array.isArray(v.images)) {
                detailImagesArray = v.images;
            }

            // Fallback to single image field if no array
            if (!detailImagesArray.length && v.image) {
                detailImagesArray = [v.image];
            }

            // All images should be full Firebase Storage URLs - use directly
            detailImages = detailImagesArray.filter(Boolean).length ? detailImagesArray : [PLACEHOLDER_IMAGE];
            console.log('☁️ Vehicle images loaded from Firebase Storage:', { count: detailImages.length, urls: detailImages.map(u => u.substring(0, 60) + '...') });

            mainImage.src = detailImages[0] || PLACEHOLDER_IMAGE;
            mainImage.alt = v.title || 'Vehicle Image';
            mainImage.onerror = () => { mainImage.src = '/logo.PNG'; console.warn('⚠️ Main image failed to load'); };

            thumbs.innerHTML = '';
            detailImages.forEach((urlSrc, idx) => {
                const thumb = document.createElement('img');
                thumb.src = urlSrc;
                thumb.alt = `Photo ${idx + 1}`;
                thumb.onerror = () => { thumb.src = '/logo.PNG'; console.warn('⚠️ Thumbnail failed'); };
                if (idx === 0) thumb.classList.add('active');
                thumb.onclick = () => setMainGalleryImage(idx);
                thumbs.appendChild(thumb);
            });

            currentImageIndex = 0;
            setMainGalleryImage(0);

            prevBtn.onclick = () => setMainGalleryImage(currentImageIndex - 1);
            nextBtn.onclick = () => setMainGalleryImage(currentImageIndex + 1);

            let touchStartX = 0;
            const galleryWrapper = document.getElementById('gallery-main');
            galleryWrapper.ontouchstart = (evt) => { touchStartX = evt.changedTouches[0].clientX; };
            galleryWrapper.ontouchend = (evt) => {
                const diff = evt.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 40) {
                    if (diff < 0) nextBtn.click(); else prevBtn.click();
                }
            };

            console.log('Number of images received:', detailImages.length, 'Number rendered:', thumbs.children.length);

            contactBtn.onclick = () => {
                const phone = v.phone || '94777150660';
                window.open(`https://wa.me/${phone}`,'_blank');
            };

            leasingBtn.onclick = () => {
                window.open(`https://wa.me/94777150660?text=${encodeURIComponent('I want leasing for ' + (v.title || 'this vehicle'))}`,'_blank');
            };


            info.innerHTML = `
                <li><strong>Brand:</strong> ${v.brand || 'N/A'}</li>
                <li><strong>Year:</strong> ${v.year || 'N/A'}</li>
                <li><strong>Fuel Type:</strong> ${v.fuelType || 'N/A'}</li>
                <li><strong>Location:</strong> ${location}</li>
                <li><strong>Views:</strong> ${v.views || 0}</li>
                <li><strong>Seller Phone:</strong> ${v.phone || 'N/A'}</li>
            `;

            desc.textContent = `Full listing details for ${v.title || 'this vehicle'}. Submit and contact seller for viewing and test-drives.`;
        }

        async function fetchVehicle() {
            const id = getQueryParam('id');
            if (!id) { setError('Vehicle identifier missing.'); return; }

            try {
                console.log('Calling API:', API_BASE_URL);
                const res = await fetch(`${API_URL}/vehicle/${id}`);
                if (!res.ok) {
                    if (res.status === 404) { setError('Vehicle not found.'); } else { setError('Failed to load vehicle details.'); }
                    return;
                }
                const data = await res.json();
                renderVehicle(data);

                console.log('Calling API:', API_BASE_URL);
                fetch(`${API_URL}/vehicle/${id}/view`, { method: 'POST' }).catch(() => {});
            } catch (e) {
                console.error(e);
                setError('Unable to load vehicle. Please try again.');
            }
        }

        fetchVehicle();

        function setupHamburgerMenu() {
            const hamburger = getEl('navbar-hamburger');
            const mobileMenu = getEl('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateNavigation();
            setupHamburgerMenu();
        });
    </script>
</body>
</html>
