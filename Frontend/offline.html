<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Muthupura.lk</title>
    <link rel="icon" type="image/x-icon" href="logo.PNG">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .offline-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .offline-actions {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .offline-tips {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #e0e0e0;
            text-align: left;
        }

        .offline-tips h3 {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .offline-tips ul {
            list-style: none;
        }

        .offline-tips li {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            padding-left: 16px;
            position: relative;
        }

        .offline-tips li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📱</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Some features may not be available right now.</p>
        
        <div class="offline-actions">
            <button class="btn-primary" onclick="location.reload()">Try Again</button>
            <button class="btn-secondary" onclick="goToHome()">Go Home</button>
        </div>

        <div class="offline-tips">
            <h3>What you can still do:</h3>
            <ul>
                <li>Browse cached content</li>
                <li>Review previously loaded vehicles</li>
                <li>Check saved listings</li>
            </ul>
        </div>
    </div>

    <script>
        function goToHome() {
            // Try to go to home, with fallback
            try {
                window.location.href = '/';
            } catch (e) {
                console.log('Cannot navigate home:', e);
            }
        }
    </script>
</body>
</html>
