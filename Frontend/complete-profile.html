<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Profile - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f5f8ff; --surface:#fff; --text:#1f304f; --muted:#5e7093; --accent1:#3a6ff8; --accent2:#8e52f8; --shadow:0 18px 36px rgba(30,62,110,0.11); }
        *{box-sizing:border-box;}
        body{margin:0; min-height:100vh; background: linear-gradient(135deg,#e9eff8,#f7fbff); font-family:'Inter','Poppins',system-ui,sans-serif; color:var(--text);}
        .frame{width:min(760px,95%);margin:0 auto;padding:18px 0;}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,0.75);border:1px solid rgba(78,100,145,0.2);box-shadow:0 10px 24px rgba(21,44,85,0.1);}
        .brand{display:flex;align-items:center;gap:10px;}.brand img{height:34px;}.brand span{font-weight:800;}.nav-links{display:flex;gap:8px;}
        .btn{border-radius:999px;padding:8px 14px;font-weight:700;cursor:pointer;transition:.2s ease;border:1px solid transparent;}.btn.secondary{background:#f1f5ff;color:#2f4f82;border:1px solid rgba(58,111,248,0.2);}.btn.primary{background:linear-gradient(110deg,var(--accent1),var(--accent2));color:#fff;}.btn:hover{transform:translateY(-1px);}
        .card{background:var(--surface);margin-top:18px;padding:24px;border-radius:18px;box-shadow:var(--shadow);border:1px solid rgba(80,99,142,0.15);}
        .form{display:grid;gap:12px;}
        .form input{border:1px solid rgba(73,98,142,0.3);border-radius:10px;padding:10px 12px;font-size:1rem;}.form input:focus{outline:none;border-color:rgba(58,111,248,0.6);box-shadow:0 0 0 4px rgba(58,111,248,0.13);}
        .alert{display:none;padding:12px;border-radius:10px;margin:10px 0;font-weight:600;}
        .alert.error{background:#fde8ea;color:#821f2d;border:1px solid #e37f88;}
        .alert.success{background:#e7f7ed;color:#1b6f35;border:1px solid #8fd3a4;}
        .hidden{display:none !important;}
    </style>
</head>
<body>
    <div class="frame">
        <nav class="navbar">
            <a class="brand" href="index.html"><img src="logo.PNG" alt="logo"><span>Muthupura.lk</span></a>
            <div class="nav-links">
                <a href="login.html" class="btn secondary">Back to Login</a>
            </div>
        </nav>

        <div class="card">
            <h1>Complete your profile</h1>
            <p>Complete your profile to continue. This improves trust and gives you full access.</p>
            <div id="alert-box" class="alert"></div>
            <div class="form">
                <div>
                    <label for="complete-name">Name</label>
                    <input type="text" id="complete-name" placeholder="Your full name" autocomplete="name" />
                </div>
                <div>
                    <label for="complete-email">Email</label>
                    <input type="email" id="complete-email" placeholder="you@example.com" autocomplete="email" />
                </div>
                <div>
                    <label for="complete-phone">Phone (read-only)</label>
                    <input type="text" id="complete-phone" readonly style="background:#f0f4fe;color:#4a5f8f;" />
                </div>
                <button id="complete-submit" class="btn primary" type="button">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        console.log('📡 Using API URL:', API_BASE_URL);
        const API_URL = API_BASE_URL;

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
        }

        function hideAlert() {
            const alertBox = document.getElementById('alert-box');
            alertBox.style.display = 'none';
        }

        function setToken(token, userName) {
            if (token) localStorage.setItem('token', token);
            if (userName) localStorage.setItem('userName', userName);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const pendingPhone = localStorage.getItem('pendingPhone');
            const queryPhone = new URLSearchParams(window.location.search).get('phone');
            const phone = pendingPhone || queryPhone;

            if (!phone) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('complete-phone').value = phone;
        });

        document.getElementById('complete-submit').addEventListener('click', async () => {
            hideAlert();
            const name = document.getElementById('complete-name').value.trim();
            const email = document.getElementById('complete-email').value.trim().toLowerCase();
            const phone = document.getElementById('complete-phone').value.trim();

            if (!name) {
                showAlert('Name is required', 'error');
                return;
            }
            if (!email || !isValidEmail(email)) {
                showAlert('A valid email is required', 'error');
                return;
            }
            if (!phone) {
                showAlert('Phone is required', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/complete-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone })
                });
                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.message || 'Unable to complete profile', 'error');
                    return;
                }

                localStorage.removeItem('pendingPhone');
                setToken(data.token, data.user?.name || '');
                showAlert('Profile completed successfully. Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 700);
            } catch (err) {
                console.error('Complete profile failed', err);
                showAlert('Unable to complete profile. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
