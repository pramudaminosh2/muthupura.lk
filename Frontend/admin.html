<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #eef2f8;
            --surface: #ffffff;
            --text: #1f2f4f;
            --muted: #5b6d8a;
            --accent1: #3a6ff8;
            --accent2: #8e52f8;
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
        }

        /* ===== NAVBAR FIXED POSITIONING ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 66%;
            box-sizing: border-box;
            background: linear-gradient(135deg, rgba(58,111,248,0.08) 0%, rgba(142,82,248,0.06) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.2px solid rgba(58,111,248,0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(58,111,248,0.08), inset 0 1px 1px rgba(255,255,255,0.9);
            padding: 0;
            height: 70px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar:hover {
            box-shadow: 0 12px 40px rgba(58,111,248,0.12), inset 0 1px 1px rgba(255,255,255,0.95);
            border-color: rgba(58,111,248,0.22);
        }

        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1f2d52;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.22s ease;
            flex-shrink: 0;
        }

        .nav-brand:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .nav-brand img {
            height: 46px;
            width: auto;
            object-fit: contain;
        }

        .nav-brand span {
            display: none;
        }

        @media (min-width: 640px) {
            .nav-brand span {
                display: inline;
            }
        }

        .nav-center a {
            text-decoration: none;
            color: #1f2d52;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.4px;
            padding: 10px 18px;
            border-radius: 14px;
            transition: all 0.22s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-center a:hover {
            color: #fff;
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
        }

        #auth-link {
            padding: 9px 18px;
            background: rgba(58, 111, 248, 0.08);
            color: #1f2f4f;
            border-radius: 12px;
            border: 1px solid rgba(58, 111, 248, 0.15);
            transition: all 0.22s ease;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-block;
        }

        #auth-link:hover {
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
            border-color: #3a6ff8;
        }

        #logout-btn {
            padding: 9px 18px;
            background: rgba(209, 40, 69, 0.08);
            color: #d12845;
            border-radius: 12px;
            border: 1px solid rgba(209, 40, 69, 0.2);
            transition: all 0.22s ease;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-block;
        }

        #logout-btn:hover {
            background: #d12845;
            color: #fff;
            border-color: #d12845;
            box-shadow: 0 8px 20px rgba(209, 40, 69, 0.25);
            transform: translateY(-2px);
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            transition: all 0.2s ease;
        }

        @media (min-width: 768px) {
            .hamburger {
                display: none;
            }
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: #1f2d52;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Mobile menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.97) 0%, rgba(248, 250, 255, 0.95) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(200, 210, 230, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            flex-direction: column;
            padding: 16px;
            gap: 8px;
            z-index: 999;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
            animation: slideDown 0.25s ease forwards;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu a {
            display: block;
            padding: 12px 16px;
            text-decoration: none;
            color: #1f2d52;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.22s ease;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(58, 111, 248, 0.1);
        }

        .mobile-menu a:hover {
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(58, 111, 248, 0.2);
            border-color: #3a6ff8;
        }

        @media (max-width: 768px) {
            .nav-center {
                display: none;
            }
        }

        .wrapper {
            max-width: 1160px;
            margin: 0 auto;
            padding: 14px 16px 24px;
        }

        .stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 24px 0;
        }

        .stat {
            flex: 1;
            min-width: 180px;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border-radius: 18px;
            padding: 20px;
            box-shadow: var(--shadow-strong);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            animation: fadeInUp 0.45s ease both;
        }

        .stat h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .stat p {
            margin: 12px 0 0;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .panel {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border-radius: 18px;
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            box-shadow: var(--shadow-strong);
            padding: 28px;
            margin-bottom: 24px;
            animation: fadeInUp 0.45s ease both;
        }

        .panel h2 {
            margin: 0 0 20px;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid rgba(74, 99, 142, 0.18);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            background: var(--surface);
        }

        thead {
            background: linear-gradient(90deg, var(--accent1), var(--accent2));
            color: white;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(74, 99, 142, 0.18);
            color: var(--text);
        }

        tbody tr:hover {
            background: rgba(58, 111, 248, 0.04);
            transition: background 0.2s ease;
        }

        img.thumb {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(74, 99, 142, 0.18);
        }

        .note {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
            border: 1.2px solid rgba(245, 158, 11, 0.3);
            color: #78350f;
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 860px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats {
                display: block;
            }

            .stat {
                margin-bottom: 12px;
            }

            .panel {
                padding: 20px;
            }

            th, td {
                padding: 12px 10px;
                font-size: 0.9rem;
            }
        }
    </style>
    </style>
</head>
<body>
    <!-- Fixed Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a class="nav-brand" href="index.html"><img src="logo.PNG" alt="Muthupura.lk"><span>Muthupura.lk</span></a>
            </div>
            <div class="nav-center">
                <a href="index.html">Home</a>
                <a href="post.html">Post Ad</a>
            </div>
            <div class="nav-right">
                <button id="logout-btn" style="padding: 9px 18px; background: rgba(209, 40, 69, 0.08); color: #d12845; border-radius: 12px; border: 1px solid rgba(209, 40, 69, 0.2); transition: all 0.22s ease; font-weight: 500; cursor: pointer; font-size: 0.9rem; display: inline-block;">Logout</button>
                <button class="hamburger" id="navbar-hamburger" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html">Home</a>
        <a href="post.html">Post Ad</a>
        <hr style="border: none; border-top: 1px solid rgba(200, 210, 230, 0.3); margin: 8px 0;">
        <button id="logout-btn-mobile" style="width: 100%; padding: 12px 16px; background: rgba(209, 40, 69, 0.08); color: #d12845; border: 1px solid rgba(209, 40, 69, 0.2); border-radius: 12px; font-weight: 500; cursor: pointer; font-size: 0.9rem; display: block; transition: all 0.22s ease;">Logout</button>
    </div>

    <div class="wrapper" style="margin-top: 100px;">

        <div class="stats">
            <div class="stat"><h3>Total Ads</h3><p id="total-ads">-</p></div>
            <div class="stat"><h3>Featured</h3><p id="featured-ads">-</p></div>
            <div class="stat"><h3>Total Views</h3><p id="total-views">-</p></div>
        </div>

        <div class="panel">
            <h2>Vehicles List</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Title</th><th>Brand</th><th>Price</th><th>Year</th><th>Phone</th><th>Fuel</th><th>Owner</th><th>Image</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="vehicles-table"></tbody>
                </table>
            </div>
        </div>

        <p class="note">Use features to highlight top vehicles; delete outdated listings quickly.</p>
    </div>

    <script src="config.js"></script>
    <script src="config.js"></script>
    <script>
        console.log('📡 Using API URL:', API_BASE_URL);
        const API_URL = API_BASE_URL;

        /**
         * Get image URL from vehicle data
         * Images are now stored as Firebase Storage URLs directly
         */
        function getImageUrl(images) {
            const FALLBACK = '/logo.PNG';
            try {
                let imageArray = [];
                if (typeof images === 'string') {
                    // Try to parse as JSON array first
                    try {
                        imageArray = JSON.parse(images);
                        // Ensure it's actually an array
                        if (!Array.isArray(imageArray)) {
                            imageArray = [images]; // Treat as single image
                        }
                    } catch (parseError) {
                        // If JSON.parse fails, treat as single image URL
                        imageArray = [images];
                    }
                } else if (Array.isArray(images)) {
                    imageArray = images;
                }
                return (imageArray && imageArray[0]) || FALLBACK;
            } catch (e) {
                console.warn('⚠️ Failed to parse images:', e.message);
                return FALLBACK;
            }
        }
        
        function getPayload(){ const t=localStorage.getItem('token'); if(!t) return null; try{return JSON.parse(atob(t.split('.')[1]));}catch{return null;} }
        function requireAdmin(){ const p=getPayload(); if(!p||p.role!=='admin'){ alert('Admin login required'); window.location.href='login.html'; return false; } return true; }
        if(!requireAdmin()) throw new Error('Unauthorized');

        document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('token'); window.location.href='login.html'; };

        async function loadVehicles(){
            const token = localStorage.getItem('token');
            try {
                console.log('Calling API:', API_BASE_URL);
                console.log('📤 Calling API: ' + API_URL + '/admin/vehicles');
                const response = await fetch(`${API_URL}/admin/vehicles`, { headers: { Authorization: `Bearer ${token}` } });
                if(!response.ok) throw new Error('Failed to load');
                const vehicles = await response.json();

                const tbody = document.getElementById('vehicles-table'); tbody.innerHTML='';
                let totalViews=0, featuredCount=0;

                if(!vehicles.length){ tbody.innerHTML='<tr><td colspan="8" style="text-align:center; padding:18px;">No vehicles found.</td></tr>'; }

                vehicles.forEach(v => {
                    totalViews += Number(v.views||0);
                    if(v.isFeatured) featuredCount++;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${v.id}</td>
                        <td>${v.title||''}</td>
                        <td>${v.brand||''}</td>
                        <td>${v.price||''}</td>
                        <td>${v.year||''}</td>
                        <td>${v.phone||''}</td>
                        <td>${v.fuelType||''}</td>
                        <td>${v.ownerId||''}</td>
                        <td><img class="thumb" src="${getImageUrl(v.image)}" onerror="this.src='/logo.PNG';console.warn('⚠️ Thumb failed:', this.src);" /></td>
                        <td>
                            <button class="btn ${v.isFeatured?'secondary':'primary'}" onclick="toggleFeature(${v.id},${v.isFeatured})">${v.isFeatured?'Unfeature':'Feature'}</button>
                            <button class="btn danger" onclick="deleteAd(${v.id})">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('total-ads').textContent = vehicles.length;
                document.getElementById('featured-ads').textContent = featuredCount;
                document.getElementById('total-views').textContent = totalViews;
            } catch(err){ console.error(err); alert('Could not load dashboard data.'); }
        }

        async function toggleFeature(id, current){
            const token = localStorage.getItem('token');
            try {
                console.log('Calling API:', API_BASE_URL);
                console.log('📤 Calling API: ' + API_URL + '/toggle-feature/' + id);
                const res = await fetch(`${API_URL}/toggle-feature/${id}`, { method:'PUT', headers:{'Content-Type':'application/json', Authorization:`Bearer ${token}`}});
                if(!res.ok) throw new Error();
                await loadVehicles();
            } catch(err){ console.error(err); alert('Feature toggle failed.'); }
        }

        async function deleteAd(id){ if(!confirm('Delete this vehicle?')) return; const token = localStorage.getItem('token'); try { console.log('Calling API:', API_BASE_URL); console.log('📤 Calling API: ' + API_URL + '/delete-vehicle/' + id); const res = await fetch(`${API_URL}/delete-vehicle/${id}`, { method:'DELETE', headers:{Authorization:`Bearer ${token}`}}); if(!res.ok) throw new Error(); await loadVehicles(); } catch(err){ console.error(err); alert('Delete failed.'); }}

        // Sync mobile logout button
        const mobileLogoutBtn = document.getElementById('logout-btn-mobile');
        if (mobileLogoutBtn) {
            mobileLogoutBtn.onclick = () => { localStorage.removeItem('token'); window.location.href='login.html'; };
        }

        // ===== HAMBURGER MENU =====
        function setupHamburgerMenu() {
            const hamburger = document.getElementById('navbar-hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        setTimeout(setupHamburgerMenu, 100);

        loadVehicles();
    </script>
</body>
</html>
