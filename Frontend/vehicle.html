<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Detail - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #eef2f8;
            --surface: #ffffff;
            --text: #1f2f4f;
            --muted: #5b6d8a;
            --accent1: #3a6ff8;
            --accent2: #8e52f8;
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
            --radius: 18px;
        }

        html, body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, rgba(58,111,248,0.12), transparent 40%), linear-gradient(to bottom, #eef2f8, #ffffff);
            background-attachment: fixed;
        }

        .container {
            max-width: 1200px;
            margin: 100px auto 0;
            padding: 0 16px 40px;
            width: 100%;
            box-sizing: border-box;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            animation: fadeInUp 0.45s ease both;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        .error-notice {
            padding: 20px;
            border-radius: 14px;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
            font-size: 0.95rem;
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .error-notice.active {
            display: block;
        }

        /* Gallery */
        .gallery-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            border-radius: var(--radius);
            box-shadow: var(--shadow-strong);
            padding: 32px;
            animation: fadeInUp 0.45s ease;
        }

        @media (max-width: 900px) {
            .card {
                padding: 24px;
            }
        }

        @media (max-width: 640px) {
            .card {
                padding: 20px;
            }
        }

        .gallery-main {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 18px;
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            background: linear-gradient(135deg, #f9faff, #f5f9ff);
            box-shadow: 0 16px 40px rgba(58, 111, 248, 0.12);
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #fff;
            background: rgba(58, 111, 248, 0.8);
            cursor: pointer;
            z-index: 2;
            transition: box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .gallery-arrow:hover {
            background: rgba(58, 111, 248, 1);
            box-shadow: 0 10px 28px rgba(58, 111, 248, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .gallery-arrow.prev {
            left: 14px;
        }

        .gallery-arrow.next {
            right: 14px;
        }

        .thumb-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
        }

        .thumb-row img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .thumb-row img:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 12px rgba(58, 111, 248, 0.2);
        }

        .thumb-row img.active {
            border-color: var(--accent1);
            transform: scale(1.06);
            box-shadow: 0 6px 16px rgba(58, 111, 248, 0.3);
        }

        .detail-title {
            margin: 0 0 14px;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        @media (max-width: 640px) {
            .detail-title {
                font-size: 1.5rem;
            }
        }

        .price {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(110deg, var(--accent1), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 16px 0;
        }

        @media (max-width: 640px) {
            .price {
                font-size: 1.5rem;
            }
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            color: var(--muted);
            font-size: 0.9rem;
            margin: 20px 0;
        }

        .meta span {
            background: linear-gradient(135deg, #f9faff, #f5f9ff);
            border: 1px solid rgba(58, 111, 248, 0.18);
            border-radius: 12px;
            padding: 8px 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        @media (max-width: 640px) {
            .action-buttons {
                flex-direction: column;
            }
        }

        .btn-primary,
        .btn-secondary {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            flex: 1;
            min-height: 48px;
        }

        @media (max-width: 640px) {
            .btn-primary,
            .btn-secondary {
                flex: 1;
            }
        }

        .btn-primary {
            background: linear-gradient(110deg, var(--accent1), var(--accent2));
            color: #fff;
            box-shadow: 0 12px 32px rgba(58, 111, 248, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(58, 111, 248, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(58, 111, 248, 0.08);
            color: var(--accent1);
            border: 1.2px solid rgba(58, 111, 248, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(58, 111, 248, 0.12);
            border-color: rgba(58, 111, 248, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.15);
        }

        /* Sections */
        .sections {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 32px;
        }

        .section {
            background: linear-gradient(135deg, #f9faff, #f5f9ff);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            border-radius: 14px;
            padding: 20px;
        }

        .section h3 {
            margin: 0 0 16px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h3 svg {
            width: 24px;
            height: 24px;
            color: var(--accent1);
        }

        .section ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: var(--text);
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(74, 99, 142, 0.08);
        }

        .section li:last-child {
            border-bottom: none;
        }

        .section li svg {
            width: 18px;
            height: 18px;
            color: var(--accent1);
            flex-shrink: 0;
        }

        .section p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .features-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            padding: 8px 0;
        }

        .feature-badge {
            background: linear-gradient(135deg, rgba(58, 111, 248, 0.12), rgba(142, 82, 248, 0.12));
            backdrop-filter: blur(8px);
            color: var(--accent1);
            padding: 10px 18px;
            border-radius: 28px;
            border: 1.4px solid rgba(58, 111, 248, 0.25);
            font-size: 0.92rem;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 4px 16px rgba(58, 111, 248, 0.1);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            display: inline-block;
            letter-spacing: 0.2px;
            cursor: default;
        }

        .feature-badge:hover {
            background: linear-gradient(135deg, rgba(58, 111, 248, 0.18), rgba(142, 82, 248, 0.18));
            border-color: rgba(58, 111, 248, 0.4);
            color: var(--accent2);
            box-shadow: 0 8px 28px rgba(58, 111, 248, 0.15);
            transform: translateY(-2px);
        }

        .feature-badge:active {
            transform: translateY(0);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .gallery-main {
                height: 300px;
            }

            .action-buttons {
                gap: 8px;
            }

            .btn-primary,
            .btn-secondary {
                padding: 12px 16px;
                font-size: 0.9rem;
            }
        }        
        /* ===== NAVBAR FIXED POSITIONING ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 81%;
            box-sizing: border-box;
            background: linear-gradient(135deg, rgba(58,111,248,0.08) 0%, rgba(142,82,248,0.06) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.2px solid rgba(58,111,248,0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(58,111,248,0.08), inset 0 1px 1px rgba(255,255,255,0.9);
            padding: 0;
            height: 70px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar:hover {
            box-shadow: 0 12px 40px rgba(58,111,248,0.12), inset 0 1px 1px rgba(255,255,255,0.95);
            border-color: rgba(58,111,248,0.22);
        }

        .nav-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #1f2d52;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.22s ease;
            flex-shrink: 0;
        }

        .nav-brand:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .nav-brand img {
            height: 46px;
            width: auto;
            object-fit: contain;
        }

        .nav-brand span {
            display: none;
        }

        @media (min-width: 640px) {
            .nav-brand span {
                display: inline;
            }
        }

        .nav-center a {
            text-decoration: none;
            color: #1f2d52;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.4px;
            padding: 10px 18px;
            border-radius: 14px;
            transition: all 0.22s ease;
            position: relative;
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-center a:hover {
            color: #fff;
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
        }

        #user-greeting {
            color: #1f2d52;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0 12px;
            white-space: nowrap;
        }

        #auth-link {
            padding: 9px 18px;
            background: rgba(58, 111, 248, 0.08);
            color: #1f2f4f;
            border-radius: 12px;
            border: 1px solid rgba(58, 111, 248, 0.15);
            transition: all 0.22s ease;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-block;
        }

        #auth-link:hover {
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 111, 248, 0.25);
            border-color: #3a6ff8;
        }

        #auth-link.logout-btn {
            background: rgba(209, 40, 69, 0.08);
            color: #d12845;
            border: 1px solid rgba(209, 40, 69, 0.2);
        }

        #auth-link.logout-btn:hover {
            background: #d12845;
            color: #fff;
            border-color: #d12845;
            box-shadow: 0 8px 20px rgba(209, 40, 69, 0.25);
            transform: translateY(-2px);
        }

        #admin-link {
            padding: 9px 18px;
            background: linear-gradient(135deg, #3a6ff8, #8e52f8);
            color: #fff;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            box-shadow: 0 6px 20px rgba(58, 111, 248, 0.2);
            transition: all 0.22s ease;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
        }

        #admin-link:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(142, 82, 248, 0.35);
        }

        .hamburger-menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px;
            transition: all 0.2s ease;
        }

        @media (min-width: 768px) {
            .hamburger-menu {
                display: none;
            }
        }

        .hamburger-line {
            width: 24px;
            height: 2.5px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hamburger-menu.active .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger-menu.active .hamburger-line:nth-child(2) {
            opacity: 0;
            transform: translateX(-10px);
        }

        .hamburger-menu.active .hamburger-line:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Mobile menu */
        .mobile-menu-dropdown {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(5, 10, 30, 0.97);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            flex-direction: column;
            gap: 0;
            z-index: 9998;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transform: translateY(-110%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-menu-dropdown.active {
            display: flex;
            transform: translateY(0);
        }

        .mobile-menu-link {
            display: block;
            padding: 14px 28px;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            letter-spacing: 0.5px;
        }

        .mobile-menu-link:hover {
            border-left-color: var(--accent1);
            color: white;
            background: rgba(255,255,255,0.05);
        }

        .mobile-menu-link.active {
            background: rgba(255,255,255,0.05);
            color: white;
            border-left-color: var(--accent1);
            font-weight: 700;
        }

        .mobile-menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 8px 0;
        }

        .mobile-menu-auth {
            border: 2px solid var(--accent1);
            color: var(--accent1);
            margin: 12px;
            border-radius: 10px;
            text-align: center;
            background: transparent !important;
            padding: 12px 24px !important;
            border-left: 2px solid var(--accent1) !important;
        }

        .mobile-menu-auth:hover {
            background: var(--accent1) !important;
            color: #ffffff;
            border-left-color: var(--accent1);
        }

        .mobile-menu-admin {
            font-size: 0.85rem;
            color: rgba(30, 42, 74, 0.6);
            padding: 10px 24px;
            border-left-color: transparent !important;
        }

        .mobile-menu-admin:hover {
            background: rgba(79, 110, 247, 0.08);
            color: var(--accent1);
            border-left-color: transparent;
        }

            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 25px rgba(142, 82, 248, 0.35);
        }

        @media (max-width: 768px) {
            .nav-center {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Fixed Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a class="nav-brand" href="index.html"><img src="logo.PNG" alt="Muthupura.lk"><span>Muthupura.lk</span></a>
            </div>
            <div class="nav-center">
                <a href="index.html">Home</a>
                <a href="post.html">Post Ad</a>
                <a href="dashboard.html" id="mylistings-link" style="display:none;">My Listings</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
            </div>
            <div class="nav-right">
                <span id="user-greeting" style="display:none;"></span>
                <a id="auth-link" href="login.html">Login</a>
                <a id="admin-link" href="admin.html" style="display:none;">Admin</a>
                <button class="hamburger-menu" id="hamburger-btn" aria-label="Toggle menu">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="mobile-menu-dropdown" id="mobile-menu">
        <a href="index.html" class="mobile-menu-link">Home</a>
        <a href="post.html" class="mobile-menu-link">Post Ad</a>
        <a href="dashboard.html" id="mylistings-link-mobile" class="mobile-menu-link" style="display:none;">My Listings</a>
        <a href="about.html" class="mobile-menu-link">About Us</a>
        <a href="contact.html" class="mobile-menu-link">Contact Us</a>
        <div class="mobile-menu-divider"></div>
        <a id="auth-link-mobile" href="login.html" class="mobile-menu-link mobile-menu-auth">Login</a>
        <a id="admin-link-mobile" href="admin.html" class="mobile-menu-link mobile-menu-admin" style="display:none;">Admin</a>
    </div>

    <div class="container">
        <div id="error-message" class="error-notice"></div>

        <div class="layout" id="vehicle-detail" style="display:none;">
            <!-- Left: Gallery -->
            <div class="gallery-container">
                <div class="gallery-main" id="gallery-main">
                    <button class="gallery-arrow prev" id="gallery-prev" aria-label="Previous image">&#10094;</button>
                    <img src="/logo.PNG" alt="Main image" id="main-image">
                    <button class="gallery-arrow next" id="gallery-next" aria-label="Next image">&#10095;</button>
                </div>
                <div class="thumb-row" id="gallery-thumbs"></div>
            </div>

            <!-- Right: Details -->
            <div class="card">
                <h1 class="detail-title" id="vehicle-title">Loading...</h1>
                <div class="price" id="vehicle-price">Rs. 0</div>
                <div class="meta" id="vehicle-meta"></div>

                <div class="action-buttons">
                    <button class="btn-primary" id="contact-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;margin-right:8px;display:inline;"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        Contact Seller
                    </button>
                    <button class="btn-secondary" id="leasing-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;margin-right:8px;display:inline;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"></path></svg>
                        Get Leasing Quote
                    </button>
                </div>

                <div class="sections">
                    <!-- Contact Info -->
                    <div class="section">
                        <h3>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Seller Information
                        </h3>
                        <ul id="contact-info"></ul>
                    </div>

                    <!-- Vehicle Info -->
                    <div class="section">
                        <h3>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M7 18c-.5 1-1.5 2-2.5 2s-2-1-2-2.5 1-2.5 2-2.5 2 1 2 2.5"></path>
                                <circle cx="7" cy="5" r="2"></circle>
                                <circle cx="18" cy="5" r="2"></circle>
                                <path d="M17 18c.5 1 1.5 2 2.5 2s2-1 2-2.5-1-2.5-2-2.5-2 1-2 2.5"></path>
                                <path d="M9 5h6v7H9z"></path>
                            </svg>
                            Vehicle Information
                        </h3>
                        <ul id="vehicle-info"></ul>
                    </div>

                    <!-- Features -->
                    <div class="section" id="features-section" style="display:none;">
                        <h3>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                <path d="M9 12l2 2 4-4"></path>
                            </svg>
                            Features & Amenities
                        </h3>
                        <div class="features-grid" id="features-list"></div>
                    </div>

                    <!-- Description -->
                    <div class="section" id="description-section" style="display:none;">
                        <h3>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16v16H4z"></path>
                                <path d="M4 8h16M4 12h16M4 16h16"></path>
                            </svg>
                            Additional Information
                        </h3>
                        <p id="vehicle-description">No additional information available.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        console.log('📡 Using API URL:', API_BASE_URL);
        const API_URL = API_BASE_URL;
        const PLACEHOLDER_IMAGE = '/logo.PNG';
        const getEl = (id) => document.getElementById(id);

        function getTokenPayload() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
        }

        async function updateNavigation() {
            try {
                let payload = getTokenPayload();
                const authLink = getEl('auth-link');
                const adminLink = getEl('admin-link');
                const myListings = getEl('mylistings-link');
                const userGreeting = getEl('user-greeting');

                if (!payload || (payload.exp && Date.now() >= payload.exp * 1000)) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('userName');
                    if (userGreeting) userGreeting.style.display = 'none';
                    payload = null;
                }

                if (payload && !payload.name) {
                    try {
                        const res = await fetch(`${API_URL}/profile`, {
                            headers: { Authorization: `Bearer ${localStorage.getItem('token')}` }
                        });
                        if (res.ok) {
                            const profile = await res.json();
                            if (profile.name) {
                                payload.name = profile.name;
                            }
                        }
                    } catch (err) {
                        console.warn('Failed to fetch profile', err);
                    }
                }

                if (adminLink) {
                    adminLink.style.display = payload?.role === 'admin' ? 'inline-block' : 'none';
                }

                if (payload) {
                    if (myListings) myListings.style.display = 'inline-block';
                    const displayName = payload.name || localStorage.getItem('userName') || payload.email || '';
                    if (userGreeting) {
                        userGreeting.textContent = displayName ? `Hi, ${displayName}` : 'Hi';
                        userGreeting.style.display = 'inline-block';
                    }
                    if (authLink) {
                        authLink.textContent = 'Logout';
                        authLink.classList.add('logout-btn');
                        authLink.href = '#';
                        authLink.onclick = (e) => {
                            e.preventDefault();
                            localStorage.removeItem('token');
                            localStorage.removeItem('userName');
                            location.reload();
                        };
                    }
                } else {
                    if (myListings) myListings.style.display = 'none';
                    if (authLink) {
                        authLink.textContent = 'Login';
                        authLink.classList.remove('logout-btn');
                        authLink.href = 'login.html';
                        authLink.onclick = null;
                    }
                }
                syncMobileAuth();
            } catch (err) {
                console.error('Navigation update error:', err);
            }
        }

        function syncMobileAuth() {
            const desktopAuthLink = getEl('auth-link');
            const mobileAuthLink = getEl('auth-link-mobile');
            if (desktopAuthLink && mobileAuthLink) {
                mobileAuthLink.textContent = desktopAuthLink.textContent;
                mobileAuthLink.href = desktopAuthLink.href;
                mobileAuthLink.onclick = desktopAuthLink.onclick;
                
                if (desktopAuthLink.classList.contains('logout-btn')) {
                    mobileAuthLink.classList.add('logout-btn');
                } else {
                    mobileAuthLink.classList.remove('logout-btn');
                }
            }
        }

        /**
         * Get image URL from vehicle data
         * Images are now stored as Firebase Storage URLs directly
         */
        function getImageUrl(images) {
            try {
                let imageArray = [];
                if (typeof images === 'string') {
                    // Try to parse as JSON array first
                    try {
                        imageArray = JSON.parse(images);
                        // Ensure it's actually an array
                        if (!Array.isArray(imageArray)) {
                            imageArray = [images]; // Treat as single image
                        }
                    } catch (parseError) {
                        // If JSON.parse fails, treat as single image URL
                        imageArray = [images];
                    }
                } else if (Array.isArray(images)) {
                    imageArray = images;
                }
                return (imageArray && imageArray[0]) || PLACEHOLDER_IMAGE;
            } catch (e) {
                console.warn('⚠️ Failed to parse images:', e.message);
                return PLACEHOLDER_IMAGE;
            }
        }

        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function getToken() {
            return localStorage.getItem('token');
        }

        function setError(message) {
            const el = document.getElementById('error-message');
            el.textContent = message;
            el.classList.add('active');
            document.getElementById('vehicle-detail').style.display = 'none';
        }

        let detailImages = [];
        let currentImageIndex = 0;

        function setMainGalleryImage(index) {
            if (!detailImages.length) return;
            currentImageIndex = ((index % detailImages.length) + detailImages.length) % detailImages.length;
            const currentSrc = detailImages[currentImageIndex];
            const mainImage = document.querySelector('#gallery-main img');
            mainImage.style.opacity = '0';
            setTimeout(() => {
                mainImage.src = currentSrc;
                mainImage.alt = `Photo ${currentImageIndex + 1}`;
                mainImage.onerror = () => { mainImage.src = '/logo.PNG'; console.warn('⚠️ Image failed to load:', currentSrc); };
                mainImage.style.opacity = '1';
            }, 160);
            const thumbs = document.getElementById('gallery-thumbs');
            thumbs.querySelectorAll('img').forEach((img, i) => img.classList.toggle('active', i === currentImageIndex));
            console.log('Gallery set to image', currentImageIndex + 1, 'of', detailImages.length);
        }

        function renderVehicle(v) {
            if (!v) {
                setError('Vehicle not found');
                return;
            }

            document.getElementById('error-message').classList.remove('active');
            const detailSection = document.getElementById('vehicle-detail');
            detailSection.style.display = 'grid';

            const title = document.getElementById('vehicle-title');
            const price = document.getElementById('vehicle-price');
            const meta = document.getElementById('vehicle-meta');
            const contactInfo = document.getElementById('contact-info');
            const info = document.getElementById('vehicle-info');
            const mainImage = document.querySelector('#gallery-main img');
            const thumbs = document.getElementById('gallery-thumbs');
            const prevBtn = document.getElementById('gallery-prev');
            const nextBtn = document.getElementById('gallery-next');
            const contactBtn = document.getElementById('contact-btn');
            const leasingBtn = document.getElementById('leasing-btn');
            const desc = document.getElementById('vehicle-description');
            const descSection = document.getElementById('description-section');
            const featuresSection = document.getElementById('features-section');
            const featuresList = document.getElementById('features-list');

            title.textContent = v.title || `${v.make || v.brand || 'Vehicle'} ${v.year || ''}`.trim();
            price.textContent = `Rs. ${Number(v.price || 0).toLocaleString()}`;
            const location = v.location || 'Unknown';
            
            meta.innerHTML = `
                <span>📍 ${location}</span>
                <span>📅 ${v.year || 'N/A'}</span>
                <span>⛽ ${v.fuelType || 'N/A'}</span>
                <span>👁️ ${v.views || 0} views</span>
            `;

            // Parse images
            let detailImagesArray = [];
            if (typeof v.images === 'string' && v.images.trim()) {
                try {
                    const parsed = JSON.parse(v.images);
                    detailImagesArray = Array.isArray(parsed) ? parsed : [v.images];
                } catch (e) {
                    detailImagesArray = [v.images];
                }
            } else if (Array.isArray(v.images)) {
                detailImagesArray = v.images;
            }

            detailImages = detailImagesArray.filter(Boolean).length ? detailImagesArray : [PLACEHOLDER_IMAGE];

            mainImage.src = detailImages[0] || PLACEHOLDER_IMAGE;
            mainImage.alt = title.textContent;
            mainImage.onerror = () => { mainImage.src = PLACEHOLDER_IMAGE; };

            thumbs.innerHTML = '';
            detailImages.forEach((urlSrc, idx) => {
                const thumb = document.createElement('img');
                thumb.src = urlSrc;
                thumb.alt = `Photo ${idx + 1}`;
                thumb.onerror = () => { thumb.src = PLACEHOLDER_IMAGE; };
                if (idx === 0) thumb.classList.add('active');
                thumb.onclick = () => setMainGalleryImage(idx);
                thumbs.appendChild(thumb);
            });

            currentImageIndex = 0;
            setMainGalleryImage(0);

            prevBtn.onclick = () => setMainGalleryImage(currentImageIndex - 1);
            nextBtn.onclick = () => setMainGalleryImage(currentImageIndex + 1);

            let touchStartX = 0;
            const galleryWrapper = document.getElementById('gallery-main');
            galleryWrapper.ontouchstart = (evt) => { touchStartX = evt.changedTouches[0].clientX; };
            galleryWrapper.ontouchend = (evt) => {
                const diff = evt.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 40) {
                    if (diff < 0) nextBtn.click(); else prevBtn.click();
                }
            };

            // Contact Info
            contactInfo.innerHTML = `
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span><strong>Seller:</strong> ${v.seller || 'Unknown'}</span>
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <span><strong>Phone:</strong> ${v.phone || 'N/A'}</span>
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span><strong>Location:</strong> ${location}</span>
                </li>
            `;

            // Vehicle Info
            info.innerHTML = `
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle></svg>
                    <span><strong>Brand:</strong> ${v.make || v.brand || 'N/A'}</span>
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle></svg>
                    <span><strong>Year:</strong> ${v.year || 'N/A'}</span>
                </li>
                <li>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle></svg>
                    <span><strong>Fuel Type:</strong> ${v.fuelType || 'N/A'}</span>
                </li>
            `;

            // Features (if available) - add sample features for demo if none exist
            let vehicleFeatures = v.features || [
                'Air Conditioned',
                'Power Steering',
                'Power Mirror',
                'Power Window',
                'Self Parking',
                'Inbuilt Display + Audio'
            ];
            
            if (vehicleFeatures && Array.isArray(vehicleFeatures) && vehicleFeatures.length > 0) {
                featuresSection.style.display = 'block';
                featuresList.innerHTML = vehicleFeatures.map(f => `<div class="feature-badge">${f}</div>`).join('');
            } else {
                featuresSection.style.display = 'none';
            }

            // Description
            if (v.description && v.description.trim()) {
                descSection.style.display = 'block';
                desc.textContent = v.description;
            } else {
                descSection.style.display = 'none';
            }

            // Buttons
            contactBtn.onclick = () => {
                const phone = (v.phone || '94777150660').replace(/\D/g, '');
                window.open(`https://wa.me/${phone}`, '_blank');
            };

            leasingBtn.onclick = () => {
                const phone = (v.phone || '94777150660').replace(/\D/g, '');
                const title = document.getElementById('vehicle-title').textContent;
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent('Hello, I am interested in leasing: ' + title)}`, '_blank');
            };
        }

        async function fetchVehicle() {
            const id = getQueryParam('id');
            if (!id) { 
                console.error('❌ No vehicle ID provided');
                setError('Vehicle identifier missing.'); 
                return; 
            }

            try {
                console.log(`📱 Fetching vehicle ${id} from:`, API_URL + `/vehicle/${id}`);
                const res = await fetch(`${API_URL}/vehicle/${id}`);
                
                if (!res.ok) {
                    if (res.status === 404) { 
                        console.error('❌ Vehicle not found');
                        setError('Vehicle not found.'); 
                    } else { 
                        console.error('❌ API error:', res.status);
                        setError('Failed to load vehicle details.'); 
                    }
                    return;
                }
                
                const data = await res.json();
                console.log('✅ Vehicle fetched:', data);
                renderVehicle(data);

                // Log view count (non-blocking)
                fetch(`${API_URL}/vehicle/${id}/view`, { method: 'POST' })
                    .then(r => r.json())
                    .then(d => console.log('📊 View logged:', d))
                    .catch(e => console.log('⚠️ View logging failed (non-critical):', e));
            } catch (e) {
                console.error('❌ Fetch error:', e);
                setError('Unable to load vehicle. Please try again.');
            }
        }

        function setupHamburgerMenu() {
            const hamburger = document.getElementById('hamburger-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        fetchVehicle();

        document.addEventListener('DOMContentLoaded', () => {
            updateNavigation();
            setupHamburgerMenu();
        });
    </script>

    <!-- ✅ Auth UI Manager - Handles login state display -->
    <script src="auth-ui.js"></script>
</body>
</html>
