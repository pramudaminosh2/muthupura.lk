<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { 
            --bg: #eef2f8; 
            --surface: #ffffff; 
            --text: #1f2f4f; 
            --muted: #5b6d8a; 
            --accent: #3a6ff8; 
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
        }
        
        .container {
            max-width: 1040px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            margin: 24px 0 12px;
            font-size: 2rem;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .desc {
            color: var(--muted);
            line-height: 1.75;
            max-width: 600px;
            margin-bottom: 24px;
        }

        .section-card,
        .card {
            margin-top: 16px;
            padding: 28px;
        }

        .form-grid {
            display: grid;
            gap: 16px;
        }

        .field label {
            display: block;
            font-size: 0.93rem;
            color: #4f648c;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .form input,
        .form textarea {
            width: 100%;
        }

        .info {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .info-card {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border: 1.2px solid rgba(74,99,142,0.18);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 28px rgba(58,111,248,0.09);
            animation: fadeInUp 0.45s ease both;
        }

        .info-card strong {
            display: block;
            margin-bottom: 10px;
            color: #2e4f8f;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .info-card a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .info-card a:hover {
            color: #8e52f8;
            text-decoration: underline;
        }

        .footer {
            margin-top: 32px;
            padding: 20px 0;
            color: var(--muted);
            text-align: center;
            font-size: 0.9rem;
            border-top: 1px solid rgba(74,99,142,0.18);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .section-card,
            .card {
                padding: 20px;
            }

            input,
            textarea {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a class="nav-brand" href="index.html"><img src="logo.PNG" alt="Muthupura.lk"><span>Muthupura.lk</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="post.html">Post Ad</a>
                <a href="about.html">About</a>
            </div>
            <div class="hamburger" id="navbar-hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
        
        <div class="mobile-menu" id="mobile-menu">
            <a href="index.html">Home</a>
            <a href="post.html">Post Ad</a>
            <a href="about.html">About</a>
        </div>

        <h1>Contact Us</h1>
        <p class="desc">Have questions? We’re here to help. Fill the form and we'll get back to you quickly.</p>

        <div class="card">
            <form class="form-grid" id="contactForm" onsubmit="event.preventDefault(); handleSubmit();">
                <div class="field" data-required>
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Your full name" required>
                </div>
                <div class="field" data-required>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="field" data-required>
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Your message..." required></textarea>
                </div>
                <button class="btn primary" type="submit" style="padding: 11px 26px; min-height: 44px; align-self: flex-start;">Send Message</button>
            </form>
        </div>

        <div class="info">
            <div class="info-card"><strong>Phone</strong>+94 777 150 660</div>
            <div class="info-card"><strong>WhatsApp</strong><a href="https://wa.me/94777150660">Message Us</a></div>
            <div class="info-card"><strong>Email</strong><a href="mailto:support@muthupura.lk">support@muthupura.lk</a></div>
        </div>

        <div class="footer">© 2026 Muthupura.lk – All rights reserved</div>
    </div>

    <script>
        function handleSubmit() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!name || !email || !message) { alert('Please fill all fields.'); return; }

            alert('Thank you! Your message has been sent.');
            document.getElementById('contactForm').reset();
        }

        // ===== HAMBURGER MENU =====
        function setupHamburgerMenu() {
            const hamburger = document.getElementById('navbar-hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        setTimeout(setupHamburgerMenu, 100);
    </script>
</body>
</html>
