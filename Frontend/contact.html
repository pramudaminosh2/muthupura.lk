<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#f8fbff; --surface:#ffffff; --text:#1f3250; --muted:#60728f; --accent:#3a6ff8; --shadow:0 12px 28px rgba(34,62,102,0.11); }
        *{box-sizing:border-box;}
        body{margin:0;font-family:'Inter','Poppins',system-ui,sans-serif;background:linear-gradient(145deg,#f6f9ff,#edf3ff);color:var(--text);}
        .container{max-width:1040px;margin:0 auto;padding:20px;}
        .navbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid rgba(146,167,205,0.3);background:rgba(255,255,255,0.75);backdrop-filter:blur(10px);}
        .navbar a{color:#2d4f8f;text-decoration:none;font-weight:600;padding:7px 10px;border-radius:8px;transition:.2s;} .navbar a:hover{background:rgba(58,111,248,0.13);}
        .card{background:var(--surface);padding:20px;border-radius:16px;box-shadow:var(--shadow);border:1px solid rgba(153,179,215,0.28);margin-top:16px;}
        h1{margin:0 0 12px;font-size:2rem;}.desc{color:var(--muted);line-height:1.6;}
        .form{display:grid;gap:12px;}
        .form input,.form textarea{border:1px solid rgba(131,147,181,0.35);border-radius:10px;padding:11px 12px;font-size:0.95rem;outline:none;}
        .form textarea{min-height:120px;resize:vertical;}
        .btn{background:linear-gradient(110deg,var(--accent),#8e52f8);color:#fff;border:none;border-radius:10px;padding:11px 15px;font-weight:700;cursor:pointer;transition:.2s;}
        .btn:hover{transform:translateY(-1px);box-shadow:0 9px 18px rgba(58,111,248,0.3);}
        .info{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
        .info div{background:#f1f5ff;border-radius:10px;padding:12px;border:1px solid rgba(137, 161, 204, 0.35);}
        .info strong{display:block;margin-bottom:6px;color:#2e4f8f;}
        .footer{margin-top:22px;padding:12px 0;color:#6a7f9e;text-align:center;font-size:0.9rem;}
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="index.html"><strong>Muthupura.lk</strong></a>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <a href="index.html">Home</a>
                <a href="post.html">Post Ad</a>
                <a href="about.html">About</a>
            </div>
        </nav>

        <h1>Contact Us</h1>
        <p class="desc">Have questions? We’re here to help. Fill the form and we'll get back to you quickly.</p>

        <div class="card">
            <form class="form" id="contactForm" onsubmit="event.preventDefault(); handleSubmit();">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Your Message" required></textarea>
                <button class="btn" type="submit">Send Message</button>
            </form>
        </div>

        <div class="info">
            <div><strong>Phone</strong>+94 777 150 660</div>
            <div><strong>WhatsApp</strong><a href="https://wa.me/94777150660" style="color:#3a6ff8;text-decoration:none;">Message Us</a></div>
            <div><strong>Email</strong><a href="mailto:support@muthupura.lk" style="color:#3a6ff8;text-decoration:none;">support@muthupura.lk</a></div>
        </div>

        <div class="footer">© 2026 Muthupura.lk – All rights reserved</div>
    </div>

    <script>
        function handleSubmit() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!name || !email || !message) { alert('Please fill all fields.'); return; }

            alert('Thank you! Your message has been sent.');
            document.getElementById('contactForm').reset();
        }
    </script>
</body>
</html>
