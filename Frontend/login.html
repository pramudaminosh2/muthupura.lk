<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #eef2f8;
            --surface: #ffffff;
            --text: #1f2f4f;
            --muted: #5b6d8a;
            --accent1: #3a6ff8;
            --accent2: #8e52f8;
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .frame {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            padding: 16px;
            flex: 1;
            justify-content: center;
        }

        .card {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            margin-top: 28px;
            border-radius: 18px;
            box-shadow: var(--shadow-strong);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            padding: 32px;
            animation: fadeInUp 0.45s ease both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mode-switch {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid rgba(58, 111, 248, 0.1);
        }

        .tab {
            flex: 1;
            padding: 12px 16px;
            background: none;
            border: none;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .tab.active {
            color: var(--accent1);
            border-bottom-color: var(--accent1);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .panel.hidden {
            display: none;
        }

        .panel h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .panel > p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        .form {
            display: grid;
            gap: 14px;
        }

        .input-wrapper {
            position: relative;
            display: grid;
        }

        .input-wrapper input {
            width: 100%;
            border: 1.1px solid rgba(58, 111, 248, 0.22);
            background: linear-gradient(to bottom, rgba(255,255,255,0.96), rgba(255,255,255,0.92));
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1rem;
            color: var(--text);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            font-family: inherit;
        }

        .input-wrapper input::placeholder {
            color: rgba(91, 109, 138, 0.6);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent1);
            box-shadow: 0 0 0 4px rgba(58,111,248,0.14), inset 0 0 0 1px rgba(58,111,248,0.06);
        }

        .input-wrapper input.invalid {
            border-color: #d12845;
            box-shadow: 0 0 0 4px rgba(209,40,69,0.15), inset 0 0 0 1px rgba(209,40,69,0.08);
        }

        .error-message {
            display: block;
            min-height: 18px;
            font-size: 0.84rem;
            color: #d12845;
            margin-top: 4px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            min-height: 48px;
        }

        .btn.primary {
            background: linear-gradient(110deg, var(--accent1), var(--accent2));
            color: #fff;
            box-shadow: 0 20px 56px rgba(58,111,248,0.18);
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 26px 66px rgba(58,111,248,0.26);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.96));
            color: #2f4f82;
            border: 1.2px solid rgba(58,111,248,0.22);
            box-shadow: 0 10px 28px rgba(58,111,248,0.09);
        }

        .btn.secondary:hover {
            background: linear-gradient(135deg, #f9faff 0%, #ffffff 100%);
            border-color: rgba(58,111,248,0.4);
            transform: translateY(-2px);
        }

        .note {
            text-align: center;
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .note .btn {
            display: inline;
            width: auto;
            padding: 0;
            background: none;
            box-shadow: none;
            color: var(--accent1);
            font-weight: 600;
            min-height: auto;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 600;
            border: 1.2px solid;
        }

        .alert.success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
            color: #166534;
            border-color: rgba(34, 197, 94, 0.3);
        }

        .alert.error {
            background: linear-gradient(135deg, rgba(209, 40, 69, 0.1), rgba(209, 40, 69, 0.05));
            color: #8b1538;
            border-color: rgba(209, 40, 69, 0.3);
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
            }

            .frame {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="frame">
        <nav class="navbar" id="navbar">
            <a class="nav-brand" href="index.html"><img src="logo.PNG" alt="logo"><span>Muthupura.lk</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="post.html">Post Ad</a>
                <a href="admin.html" id="admin-link" style="display:none;">Admin</a>
                <button class="btn primary" id="logout-btn" style="display:none;">Logout</button>
            </div>
            <div class="hamburger" id="navbar-hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
        
        <div class="mobile-menu" id="mobile-menu">
            <a href="index.html">Home</a>
            <a href="post.html">Post Ad</a>
            <a href="admin.html" id="admin-link-mobile" style="display:none;">Admin</a>
            <button class="btn primary" id="logout-btn-mobile" style="display:none;">Logout</button>
        </div>

        <div class="card">
            <div class="mode-switch">
                <button class="tab active" id="login-mode-btn" type="button">Login</button>
                <button class="tab" id="register-mode-btn" type="button">Register</button>
            </div>
            <div id="alert-box" class="alert"></div>

            <div id="login-panel" class="panel">
                <h1>Welcome Back</h1>
                <p>Login to manage your ads and post faster.</p>
                <div class="form">
                    <div class="input-wrapper">
                        <input type="email" id="login-email" placeholder="Email" autocomplete="username" />
                        <small id="login-email-error" class="error-message"></small>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
                        <button type="button" class="toggle-password" data-target="login-password">👁️</button>
                        <small id="login-password-error" class="error-message"></small>
                    </div>
                    <button class="btn primary" id="login-submit" type="button">Login</button>

                    <div class="button-group" style="margin-top: 16px;">
                        <button class="btn secondary" id="google-login-btn" type="button">Continue with Google</button>
                        <button class="btn secondary" id="facebook-login-btn" type="button" style="margin-top: 8px;">Continue with Facebook</button>
                    </div>

                    <div class="divider" style="margin: 20px 0; border-top: 1px solid rgba(58,111,248,0.1); position: relative;">
                        <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: white; padding: 0 12px; color: var(--muted); font-size: 0.85rem;">or</span>
                    </div>

                    <div class="otp-section" style="margin-top: 16px;">
                        <label for="otp-phone" style="display:block; font-weight:600; margin-bottom:8px; color: var(--text);">Login with Phone OTP</label>
                        <div class="input-wrapper" style="margin-bottom: 12px;">
                            <input type="text" id="otp-phone" placeholder="Enter phone number" style="width:100%; padding:12px 16px; border:1.1px solid var(--border-strong); border-radius:12px; font-size:1rem;" />
                        </div>
                        <button class="btn secondary" id="send-otp-btn" type="button">Send OTP</button>
                        <div id="recaptcha-container" style="margin-top: 16px;"></div>
                        <div id="otp-verification" style="display:none; margin-top:16px;">
                            <div class="input-wrapper" style="margin-bottom: 12px;">
                                <input type="text" id="otp-code" placeholder="Enter OTP" style="width:100%; padding:12px 16px; border:1.1px solid var(--border-strong); border-radius:12px; font-size:1rem;" />
                            </div>
                            <button class="btn secondary" id="verify-otp-btn" type="button">Verify OTP</button>
                        </div>
                    </div>
                </div>
                <div class="switch-prompt" style="text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(58,111,248,0.1);">
                    <p style="margin: 0; color: var(--muted); font-size: 0.9rem;">Don't have an account?
                        <button class="btn secondary" id="switch-to-register" type="button" style="display: inline; width: auto; padding: 4px 12px; margin-left: 8px; font-size: 0.9rem; min-height: auto;">Register</button>
                    </p>
                </div>
            </div>

            <div id="register-panel" class="panel hidden">
                <h1>Create Account</h1>
                <p>Register and start posting vehicle listings in minutes.</p>
                <div class="form">
                    <div class="input-wrapper">
                        <input type="text" id="register-name" placeholder="Full Name" autocomplete="name" />
                        <small id="register-name-error" class="error-message"></small>
                    </div>
                    <div class="input-wrapper">
                        <input type="email" id="register-email" placeholder="Email" autocomplete="email" />
                        <small id="register-email-error" class="error-message"></small>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="register-password" placeholder="Password" autocomplete="new-password" />
                        <button type="button" class="toggle-password" data-target="register-password">👁️</button>
                        <small id="register-password-error" class="error-message"></small>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="register-confirm" placeholder="Confirm Password" autocomplete="new-password" />
                        <button type="button" class="toggle-password" data-target="register-confirm">👁️</button>
                        <small id="register-confirm-error" class="error-message"></small>
                    </div>
                    <button class="btn primary" id="register-submit" type="button">Register</button>
                </div>
                <div class="switch-prompt" style="text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(58,111,248,0.1);">
                    <p style="margin: 0; color: var(--muted); font-size: 0.9rem;">Already have an account?
                        <button class="btn secondary" id="switch-to-login" type="button" style="display: inline; width: auto; padding: 4px 12px; margin-left: 8px; font-size: 0.9rem; min-height: auto;">Login</button>
                    </p>
                </div>
            </div>


    <script src="config.js"></script>
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyD6APHZMfX39NE3D0QmqhM9CYcJLEYAq7A",
            authDomain: "muthupuralk.firebaseapp.com",
            projectId: "muthupuralk",
            storageBucket: "muthupuralk.firebasestorage.app",
            messagingSenderId: "181421595643",
            appId: "1:181421595643:web:20a29817ca1f7aa53a495e",
            measurementId: "G-SFW03YC9X1"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);

        let recaptchaVerifier = null;
        let confirmationResult = null;

        function initRecaptcha() {
            if (window.recaptchaVerifier) {
                console.log('✅ RecaptchaVerifier already initialized');
                recaptchaVerifier = window.recaptchaVerifier;
                return;
            }

            try {
                console.log('🔏 Initializing RecaptchaVerifier...');
                window.recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
                    size: 'normal',
                    callback: (response) => {
                        console.log('✅ Recaptcha verified successfully');
                    },
                    onExpired: () => {
                        console.warn('⚠️ Recaptcha expired, will re-initialize on next OTP attempt');
                        window.recaptchaVerifier = null;                        window.recaptchaVerifier = null;                    }
                }, auth);
                recaptchaVerifier = window.recaptchaVerifier;

                console.log('✅ RecaptchaVerifier initialized successfully');
            } catch (err) {
                console.error('❌ RecaptchaVerifier initialization failed:', err);
                recaptchaVerifier = null;
                window.recaptchaVerifier = null;
                throw err;
            }
        }

        // Initialize recaptcha once Firebase is loaded
        try {
            initRecaptcha();
        } catch (err) {
            console.warn('⚠️ Recaptcha will initialize on first OTP attempt:', err.message);
        }

        const API_URL = API_BASE_URL;
        const getEl = (id) => document.getElementById(id);

        function getToken() {
            return localStorage.getItem('token');
        }

        function setToken(token, userName) {
            if (token) {
                localStorage.setItem('token', token);
            }
            if (userName) {
                localStorage.setItem('userName', userName);
            }
        }

        function clearToken() {
            localStorage.removeItem('token');
            localStorage.removeItem('userName');
        }

        function updateNav(user) {
            const adminLink = getEl('admin-link');
            const userGreeting = getEl('user-greeting');
            const logoutBtn = getEl('logout-btn');

            if (user) {
                if (userGreeting) {
                    userGreeting.textContent = `Hello, ${user.name || user.email}`;
                    userGreeting.style.display = 'inline-flex';
                }
                if (logoutBtn) logoutBtn.style.display = 'inline-flex';
                if (adminLink) adminLink.style.display = user.role === 'admin' ? 'inline-flex' : 'none';
            } else {
                if (userGreeting) userGreeting.style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'none';
                if (adminLink) adminLink.style.display = 'none';
            }
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showFieldError(id, message) {
            const el = getEl(id);
            if (el) {
                el.textContent = message;
                el.style.display = message ? 'block' : 'none';
            }
        }

        function clearFieldErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
        }

        function showAlert(message, type = 'error') {
            const alertBox = getEl('alert-box');
            if (!alertBox) return;
            alertBox.textContent = message;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
        }

        function hideAlert() {
            const alertBox = getEl('alert-box');
            if (alertBox) alertBox.style.display = 'none';
        }

        function setMode(mode) {
            const isLogin = mode === 'login';
            const loginPanel = getEl('login-panel');
            const registerPanel = getEl('register-panel');
            const loginBtn = getEl('login-mode-btn');
            const registerBtn = getEl('register-mode-btn');
            
            if (isLogin) {
                if (loginPanel) loginPanel.classList.add('active');
                if (loginPanel) loginPanel.classList.remove('hidden');
                if (registerPanel) registerPanel.classList.remove('active');
                if (registerPanel) registerPanel.classList.add('hidden');
                if (loginBtn) loginBtn.classList.add('active');
                if (registerBtn) registerBtn.classList.remove('active');
            } else {
                if (registerPanel) registerPanel.classList.add('active');
                if (registerPanel) registerPanel.classList.remove('hidden');
                if (loginPanel) loginPanel.classList.remove('active');
                if (loginPanel) loginPanel.classList.add('hidden');
                if (registerBtn) registerBtn.classList.add('active');
                if (loginBtn) loginBtn.classList.remove('active');
            }
            hideAlert();
            clearFieldErrors();
        }

        async function performLogin(email, password, redirect = true) {
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (!res.ok) {
                    showAlert(data.message || 'Login failed', 'error');
                    return false;
                }

                setToken(data.token, data.user?.name || '');
                const role = data.role || data.user?.role || 'user';
                updateNav(data.user || { role });
                showAlert('Login successful! Redirecting...', 'success');

                if (redirect) {
                    setTimeout(() => {
                        if (role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 700);
                }

                return true;
            } catch (error) {
                console.error('Login request error:', error);
                showAlert('Unable to login now.', 'error');
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('Navbar element:', getEl('navbar'));
            const googleBtn = getEl('google-login-btn');
            if (googleBtn) {
                googleBtn.addEventListener('click', () => {
                    window.open(`${API_URL}/auth/google`, 'GoogleAuth', 'width=500,height=650');
                });
            }

            const facebookBtn = getEl('facebook-login-btn');
            if (facebookBtn) {
                facebookBtn.addEventListener('click', () => {
                    window.open(`${API_URL}/auth/facebook`, 'FacebookAuth', 'width=500,height=650');
                });
            }

            const sendOtpBtn = getEl('send-otp-btn');
            if (sendOtpBtn) {
                sendOtpBtn.addEventListener('click', async () => {
                    const phoneEl = getEl('otp-phone');
                    const rawPhone = phoneEl?.value.trim() || '';

                    if (!rawPhone || !/^\+?[0-9]{7,15}$/.test(rawPhone)) {
                        showAlert('Please enter a valid phone number including country code (e.g., +94712345678)', 'error');
                        return;
                    }

                    try {
                        console.log('📱 Sending OTP for phone:', rawPhone);

                        if (!recaptchaVerifier || !window.recaptchaVerifier) {
                            console.log('🔏 RecaptchaVerifier not ready, reinitializing...');
                            initRecaptcha();
                        }

                        showAlert('Sending OTP...', 'success');
                        console.log('📤 Calling signInWithPhoneNumber...');

                        confirmationResult = await signInWithPhoneNumber(auth, rawPhone, recaptchaVerifier);

                        console.log('✅ OTP sent successfully');
                        showAlert('✅ OTP sent via Firebase. Check your phone.', 'success');
                        const otpVerificationEl = getEl('otp-verification');
                        if (otpVerificationEl) otpVerificationEl.style.display = 'block';
                    } catch (err) {
                        console.error('❌ Firebase OTP error:', err);
                        console.error('Error code:', err.code);
                        console.error('Error message:', err.message);

                        recaptchaVerifier = null;
                        window.recaptchaVerifier = null;
                        confirmationResult = null;

                        let errorMsg = 'Unable to send OTP. Please try again.';
                        if (err.code === 'auth/invalid-phone-number') {
                            errorMsg = 'Invalid phone number. Please include country code (e.g., +94712345678)';
                        } else if (err.code === 'auth/quota-exceeded') {
                            errorMsg = 'Too many attempts. Please try again later.';
                        } else if (err.code === 'auth/internal-error') {
                            errorMsg = 'Firebase service error. Please check your phone number and try again.';
                        }

                        showAlert(errorMsg, 'error');
                    }
                });
            }

            const verifyOtpBtn = getEl('verify-otp-btn');
            if (verifyOtpBtn) {
                verifyOtpBtn.addEventListener('click', async () => {
                    const otpInput = getEl('otp-code');
                    const otp = otpInput?.value.trim() || '';

                    if (!otp || otp.length < 6) {
                        showAlert('Please enter the 6-digit OTP code', 'error');
                        return;
                    }

                    if (!confirmationResult) {
                        showAlert('⚠️ OTP session expired. Press Send OTP again.', 'error');
                        const otpVerificationEl = getEl('otp-verification');
                        if (otpVerificationEl) otpVerificationEl.style.display = 'none';
                        recaptchaVerifier = null;
                        window.recaptchaVerifier = null;
                        return;
                    }

                    try {
                        console.log('🔐 Verifying OTP...');
                        const result = await confirmationResult.confirm(otp);
                        const firebasePhone = result.user?.phoneNumber;

                        console.log('✅ OTP verified successfully');
                        console.log('Firebase phone:', firebasePhone);

                        if (!firebasePhone) {
                            console.error('❌ No phone number from Firebase');
                            showAlert('Could not determine phone from Firebase account', 'error');
                            return;
                        }

                        console.log('📤 Logging in with phone:', firebasePhone);
                        const res = await fetch(`${API_URL}/otp-login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone: firebasePhone })
                        });

                        const data = await res.json();
                        if (!res.ok) {
                            showAlert(data.message || 'OTP login failed', 'error');
                            return;
                        }

                        if (data.isNewUser) {
                            console.log('📋 New user detected, redirecting to complete profile');
                            localStorage.setItem('pendingPhone', data.phone || firebasePhone.replace(/\D/g, ''));
                            showAlert('Phone verified. Complete profile to continue.', 'success');
                            setTimeout(() => {
                                window.location.href = 'complete-profile.html';
                            }, 700);
                            return;
                        }

                        console.log('✅ OTP login successful');
                        setToken(data.token, data.user?.name || '');
                        updateNav(data.user || { role: data.role || 'user' });
                        showAlert('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            if (data.role === 'admin') {
                                window.location.href = 'admin.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        }, 700);
                    } catch (err) {
                        console.error('❌ OTP verification failed:', err);
                        console.error('Error code:', err.code);
                        console.error('Error message:', err.message);

                        let errorMsg = 'OTP verification failed. Check code and try again.';
                        if (err.code === 'auth/invalid-verification-code') {
                            errorMsg = 'Invalid OTP code. Please check and try again.';
                        } else if (err.code === 'auth/code-expired') {
                            errorMsg = 'OTP has expired. Press Send OTP to get a new code.';
                        }

                        showAlert(errorMsg, 'error');
                    }
                });
            }

            const loginModeBtn = getEl('login-mode-btn');
            if (loginModeBtn) loginModeBtn.addEventListener('click', () => setMode('login'));
            const registerModeBtn = getEl('register-mode-btn');
            if (registerModeBtn) registerModeBtn.addEventListener('click', () => setMode('register'));
            const switchToRegister = getEl('switch-to-register');
            if (switchToRegister) switchToRegister.addEventListener('click', () => setMode('register'));
            const switchToLogin = getEl('switch-to-login');
            if (switchToLogin) switchToLogin.addEventListener('click', () => setMode('login'));

            const loginSubmit = getEl('login-submit');
            if (loginSubmit) {
                loginSubmit.addEventListener('click', async () => {
                    const email = (getEl('login-email')?.value || '').trim();
                    const password = getEl('login-password')?.value || '';

                    hideAlert();
                    clearFieldErrors();

                    let isValid = true;
                    if (!email || !isValidEmail(email)) {
                        showFieldError('login-email-error', 'Invalid email format');
                        isValid = false;
                    }
                    if (!password) {
                        showFieldError('login-password-error', 'Password is required');
                        isValid = false;
                    }

                    if (!isValid) {
                        return showAlert('Please correct the highlighted fields', 'error');
                    }

                    await performLogin(email, password, true);
                });
            }

            const registerSubmit = getEl('register-submit');
            if (registerSubmit) {
                registerSubmit.addEventListener('click', async () => {
                    const name = (getEl('register-name')?.value || '').trim();
                    const email = (getEl('register-email')?.value || '').trim();
                    const password = getEl('register-password')?.value || '';
                    const confirm = getEl('register-confirm')?.value || '';

                    hideAlert();
                    clearFieldErrors();

                    let isValid = true;
                    if (!name) {
                        showFieldError('register-name-error', 'Name is required');
                        isValid = false;
                    }
                    if (!email || !isValidEmail(email)) {
                        showFieldError('register-email-error', 'Invalid email format');
                        isValid = false;
                    }
                    if (!password || password.length < 8) {
                        showFieldError('register-password-error', 'Password must be at least 8 characters');
                        isValid = false;
                    }
                    if (password !== confirm) {
                        showFieldError('register-confirm-error', 'Passwords do not match');
                        isValid = false;
                    }

                    if (!isValid) {
                        return showAlert('Please fix errors before continuing', 'error');
                    }

                    try {
                        const res = await fetch(`${API_URL}/register`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name, email, password })
                        });

                        const data = await res.json();
                        if (!res.ok) {
                            showAlert(data.message || 'Registration failed', 'error');
                            return;
                        }

                        showAlert('Registration successful! Logging in...', 'success');
                        const loggedIn = await performLogin(email, password, true);
                        if (!loggedIn) {
                            setMode('login');
                        }
                    } catch (error) {
                        console.error('Register request error:', error);
                        showAlert('Unable to register now.', 'error');
                    }
                });
            }

            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.dataset.target;
                    const input = getEl(targetId);
                    if (!input) return;
                    const hidden = input.type === 'password';
                    input.type = hidden ? 'text' : 'password';
                    btn.textContent = hidden ? '🙈' : '👁️';
                });
            });

            const logoutBtn = getEl('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    clearToken();
                    updateNav(null);
                    window.location.href = 'index.html';
                });
            }

            const mobileLogoutBtn = getEl('logout-btn-mobile');
            if (mobileLogoutBtn) {
                mobileLogoutBtn.addEventListener('click', () => {
                    clearToken();
                    updateNav(null);
                    window.location.href = 'index.html';
                });
            }

            setMode('login');
            checkSession();
            setTimeout(setupHamburgerMenu, 100);
        });

        window.addEventListener('message', (event) => {
            if (!event.data || !event.data.token) return;
            setToken(event.data.token);
            updateNav(event.data.user || { role: event.data.role || 'user' });
            if (event.data.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        });

        async function checkSession() {
            const token = getToken();
            if (!token) {
                return updateNav(null);
            }

            try {
                const res = await fetch(`${API_URL}/me`, {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!res.ok) {
                    clearToken();
                    updateNav(null);
                    setMode('login');
                    return;
                }

                const data = await res.json();
                updateNav(data.user);
                if (window.location.pathname.endsWith('login.html')) {
                    if (data.user?.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            } catch (err) {
                console.error('Session check failed', err);
                clearToken();
                updateNav(null);
                setMode('login');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const logoutBtn = getEl('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    clearToken();
                    updateNav(null);
                    window.location.href = 'index.html';
                });
            }

            const mobileLogoutBtn = getEl('logout-btn-mobile');
            if (mobileLogoutBtn) {
                mobileLogoutBtn.addEventListener('click', () => {
                    clearToken();
                    updateNav(null);
                    window.location.href = 'index.html';
                });
            }

            setMode('login');
            checkSession();
            setTimeout(setupHamburgerMenu, 100);
        });

        // ===== HAMBURGER MENU =====
        function setupHamburgerMenu() {
            const hamburger = getEl('navbar-hamburger');
            const mobileMenu = getEl('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        setTimeout(setupHamburgerMenu, 100);
    </script>
</body>
</html>
