<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complete Profile - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root { 
            --bg: #eef2f8; 
            --surface: #ffffff; 
            --text: #1f2f4f; 
            --muted: #5b6d8a; 
            --accent1: #3a6ff8; 
            --accent2: #8e52f8; 
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
        }
        
        .frame {
            width: min(760px, 95%);
            margin: 0 auto;
            padding: 18px 0;
        }

        .card {
            margin-top: 18px;
            border-radius: 18px;
            box-shadow: var(--shadow-strong);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            padding: 28px;
        }

        .card h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card > p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        .form-grid {
            display: grid;
            gap: 16px;
        }

        .field label {
            display: block;
            font-size: 0.93rem;
            color: #4f648c;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .form input[readonly] {
            background: rgba(58, 111, 248, 0.06) !important;
            cursor: not-allowed;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 14px;
            margin: 16px 0;
            font-weight: 600;
            border: 1.2px solid;
            animation: fadeIn 0.3s ease;
        }

        .alert.success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
            color: #166534;
            border-color: rgba(34, 197, 94, 0.3);
        }

        .alert.error {
            background: linear-gradient(135deg, rgba(209, 40, 69, 0.1), rgba(209, 40, 69, 0.05));
            color: #8b1538;
            border-color: rgba(209, 40, 69, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 640px) {
            .card {
                padding: 20px;
            }

            .card h1 {
                font-size: 1.2rem;
            }

            input {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }
    </style>
</head>
<body>
    <div class="frame">
        <nav class="navbar">
            <a class="nav-brand" href="index.html"><img src="logo.PNG" alt="logo"><span>Muthupura.lk</span></a>
            <div class="nav-links">
                <a href="login.html">Back to Login</a>
            </div>
            <div class="hamburger" id="navbar-hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
        
        <div class="mobile-menu" id="mobile-menu">
            <a href="login.html">Back to Login</a>
        </div>

        <div class="card">
            <h1>Complete your profile</h1>
            <p>Complete your profile to continue. This improves trust and gives you full access.</p>
            <div id="alert-box" class="alert hidden"></div>
            <div class="form-grid">
                <div class="field" data-required>
                    <label for="complete-name">Name</label>
                    <input type="text" id="complete-name" placeholder="Your full name" autocomplete="name" required />
                </div>
                <div class="field" data-required>
                    <label for="complete-email">Email</label>
                    <input type="email" id="complete-email" placeholder="you@example.com" autocomplete="email" required />
                </div>
                <div class="field" data-required>
                    <label for="complete-phone">Phone</label>
                    <input type="text" id="complete-phone" readonly placeholder="Phone number" />
                </div>
                <button id="complete-submit" class="btn primary" type="button" style="padding: 11px 26px; min-height: 44px;">Save Profile</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        console.log('📡 Using API URL:', API_BASE_URL);
        const API_URL = API_BASE_URL;

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.className = `alert ${type}`;
            alertBox.style.display = 'block';
        }

        function hideAlert() {
            const alertBox = document.getElementById('alert-box');
            alertBox.style.display = 'none';
        }

        function setToken(token, userName) {
            if (token) localStorage.setItem('token', token);
            if (userName) localStorage.setItem('userName', userName);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const pendingPhone = localStorage.getItem('pendingPhone');
            const queryPhone = new URLSearchParams(window.location.search).get('phone');
            const phone = pendingPhone || queryPhone;

            if (!phone) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('complete-phone').value = phone;
        });

        document.getElementById('complete-submit').addEventListener('click', async () => {
            hideAlert();
            const name = document.getElementById('complete-name').value.trim();
            const email = document.getElementById('complete-email').value.trim().toLowerCase();
            const phone = document.getElementById('complete-phone').value.trim();

            if (!name) {
                showAlert('Name is required', 'error');
                return;
            }
            if (!email || !isValidEmail(email)) {
                showAlert('A valid email is required', 'error');
                return;
            }
            if (!phone) {
                showAlert('Phone is required', 'error');
                return;
            }

            try {
                console.log('Calling API:', API_BASE_URL);
                const response = await fetch(`${API_URL}/complete-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone })
                });
                const data = await response.json();

                if (!response.ok) {
                    showAlert(data.message || 'Unable to complete profile', 'error');
                    return;
                }

                localStorage.removeItem('pendingPhone');
                setToken(data.token, data.user?.name || '');
                showAlert('Profile completed successfully. Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 700);
            } catch (err) {
                console.error('Complete profile failed', err);
                showAlert('Unable to complete profile. Please try again.', 'error');
            }
        });

        // ===== HAMBURGER MENU =====
        function setupHamburgerMenu() {
            const hamburger = document.getElementById('navbar-hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        setTimeout(setupHamburgerMenu, 100);
    </script>
</body>
</html>
