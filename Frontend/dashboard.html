<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller Dashboard - Muthupura.lk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg: #eef2f8;
            --surface: #ffffff;
            --text: #1f2f4f;
            --muted: #5b6d8a;
            --accent1: #3a6ff8;
            --accent2: #8e52f8;
            --shadow-strong: 0 32px 90px rgba(25, 73, 145, 0.14);
            --radius: 18px;
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 18px 14px 36px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border-radius: var(--radius);
            padding: 20px;
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            box-shadow: var(--shadow-strong);
            animation: fadeInUp 0.45s ease both;
        }

        .stat h3 {
            margin: 0 0 10px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .stat p {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 28px 0 18px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-head small {
            color: var(--muted);
        }

        .vehicle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
        }

        .card {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.96) 100%);
            border: 1.2px solid rgba(58, 111, 248, 0.14);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-strong);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: fadeInUp 0.45s ease both;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(58, 111, 248, 0.2);
        }

        .card-top {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .card-top img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-top img {
            transform: scale(1.05);
        }

        .card-top::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.55));
        }

        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(28, 36, 68, 0.9);
            color: #fff;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 2;
            backdrop-filter: blur(8px);
        }

        .card-badge.ev {
            left: auto;
            right: 12px;
            background: linear-gradient(110deg, #3cd06a, #14b4f7);
            box-shadow: 0 4px 12px rgba(60, 208, 106, 0.3);
        }

        .card-body {
            padding: 16px;
        }

        .card-title {
            margin: 0 0 10px;
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f2f4f 0%, #3a6ff8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .card-meta span {
            background: linear-gradient(135deg, #f9faff, #f5f9ff);
            border-radius: 8px;
            padding: 6px 10px;
            border: 1px solid rgba(58, 111, 248, 0.12);
        }

        .card-actions {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-actions .btn {
            font-size: 0.82rem;
            padding: 8px 12px;
            flex: 1;
            min-width: 80px;
        }

        .empty {
            border: 1.2px solid rgba(58, 111, 248, 0.18);
            background: linear-gradient(135deg, rgba(58, 111, 248, 0.05), rgba(142, 82, 248, 0.03));
            color: #2f4f82;
            border-radius: 18px;
            padding: 32px 20px;
            text-align: center;
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 680px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .card-meta {
                justify-content: start;
            }

            .section-head {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a class="nav-brand" href="index.html"><img src="logo.PNG" alt="Muthupura.lk"><span>Muthupura.lk</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="post.html">Post Ad</a>
                <a href="dashboard.html">My Listings</a>
                <button class="btn primary" id="logoutBtn">Logout</button>
            </div>
            <div class="hamburger" id="navbar-hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
        
        <div class="mobile-menu" id="mobile-menu">
            <a href="index.html">Home</a>
            <a href="post.html">Post Ad</a>
            <a href="dashboard.html">My Listings</a>
            <button class="btn primary" id="logoutBtn-mobile">Logout</button>
        </div>

        <section class="section-head">
            <div>
                <h2>Seller Dashboard</h2>
                <small>Manage your listings and update your vehicle inventory quickly.</small>
            </div>
            <div>
                <button id="refreshBtn" class="btn primary">Refresh</button>
            </div>
        </section>

        <div class="stats">
            <div class="stat"><h3>Total Listings</h3><p id="total-listings">0</p></div>
            <div class="stat"><h3>Total Views</h3><p id="total-views">0</p></div>
            <div class="stat"><h3>Featured</h3><p id="total-featured">0</p></div>
        </div>

        <section class="section-head"><h2>Your Vehicles</h2></section>
        <div id="vehicle-list" class="vehicle-grid"></div>
        <div id="empty" class="empty" style="display:none;">No vehicles yet. Use Post Ad to add your first listing.</div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_URL = API_BASE_URL;
        console.log('📡 Using API URL:', API_URL);
        const FALLBACK_IMAGE = '/logo.PNG';

        /**
         * Get image URL from vehicle data
         * Images are now stored as Firebase Storage URLs directly
         */
        function getImageUrl(images) {
            try {
                let imageArray = [];
                if (typeof images === 'string') {
                    // Try to parse as JSON array first
                    try {
                        imageArray = JSON.parse(images);
                        // Ensure it's actually an array
                        if (!Array.isArray(imageArray)) {
                            imageArray = [images]; // Treat as single image
                        }
                    } catch (parseError) {
                        // If JSON.parse fails, treat as single image URL
                        imageArray = [images];
                    }
                } else if (Array.isArray(images)) {
                    imageArray = images;
                }
                return (imageArray && imageArray[0]) || FALLBACK_IMAGE;
            } catch (e) {
                console.warn('⚠️ Failed to parse images:', e.message);
                return FALLBACK_IMAGE;
            }
        }

        function getTokenPayload() {
            const token = localStorage.getItem('token');
            if (!token) return null;
            try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
        }

        function requireLogin() {
            const payload = getTokenPayload();
            if (!payload) {
                window.location.href = 'login.html';
                return false;
            }
            return payload;
        }

        function isEV(vehicle) {
            return (vehicle.fuelType || '').toString() === 'Electric';
        }

        function escapeHtml(text) { return String(text).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c])); }

        function createCard(vehicle) {
            const card = document.createElement('article');
            card.className = 'card';
            const imageUrl = getImageUrl(vehicle.images || vehicle.image);
            const ev = isEV(vehicle);
            const featured = Number(vehicle.isFeatured || 0);
            const location = vehicle.location || 'Unknown';

            card.innerHTML = `
                <div class="card-top">
                    <img src="${imageUrl}" alt="${escapeHtml(vehicle.title || 'Vehicle')}" onerror="this.src='/logo.PNG';console.warn('⚠️ Image failed:', this.src);" />
                    ${featured ? '<span class="card-badge">Featured</span>' : ''}
                    ${ev ? '<span class="card-badge ev">⚡ EV</span>' : ''}
                </div>
                <div class="card-body">
                    <h3 class="card-title">${escapeHtml(vehicle.title || 'Untitled')}</h3>
                    <div class="card-meta">
                        <span>${escapeHtml(vehicle.brand || 'Brand')}</span>
                        <span>${escapeHtml(vehicle.year || 'Year')}</span>
                        <span>${escapeHtml(vehicle.fuelType || 'Fuel')}</span>
                        <span>📍 ${escapeHtml(location)}</span>
                        <span>${featured ? '⭐ Featured' : 'Normal'}</span>
                        <span>👁️ ${Number(vehicle.views || 0)}</span>
                    </div>
                    <div class="card-actions">
                        <button class="btn secondary" onclick="handleEdit(${vehicle.id})">Edit</button>
                        <button class="btn btn-danger" style="background:#e26985;color:#fff;" onclick="handleDelete(${vehicle.id})">Delete</button>
                    </div>
                </div>
            `;

            return card;
        }

        async function fetchListings() {
            const payload = requireLogin();
            if (!payload) return;

            const token = localStorage.getItem('token');
            const listingContainer = document.getElementById('vehicle-list');
            listingContainer.innerHTML = '';
            document.getElementById('empty').style.display = 'none';

            for (let i = 0; i < 6; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'card';
                placeholder.style.minHeight = '220px';
                placeholder.style.opacity = '0.7';
                placeholder.style.background = 'linear-gradient(90deg, rgba(244,246,252,1) 8%, rgba(233,239,251,1) 18%, rgba(244,246,252,1) 33%)';
                placeholder.style.backgroundSize = '800px 100px';
                placeholder.style.animation = 'skeleton-loading 1.2s infinite linear';
                listingContainer.appendChild(placeholder);
            }

            try {
                const res = await fetch(`${API_URL}/my-vehicles`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to retrieve your vehicles');
                const vehicles = await res.json();

                listingContainer.innerHTML = '';
                if (!vehicles.length) {
                    document.getElementById('empty').style.display = 'block';
                    document.getElementById('total-listings').textContent = '0';
                    document.getElementById('total-views').textContent = '0';
                    document.getElementById('total-featured').textContent = '0';
                    return;
                }

                let totalViews = 0;
                let featuredCount = 0;

                vehicles.forEach(v => {
                    totalViews += Number(v.views || 0);
                    featuredCount += Number(v.isFeatured || 0);
                    listingContainer.appendChild(createCard(v));
                });

                document.getElementById('total-listings').textContent = String(vehicles.length);
                document.getElementById('total-views').textContent = String(totalViews);
                document.getElementById('total-featured').textContent = String(featuredCount);
            } catch (error) {
                console.error(error);
                alert('Unable to load your listings right now. Please try again.');
            }
        }

        async function handleDelete(id) {
            if (!confirm('Delete this vehicle?')) return;
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/delete-vehicle/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
                if (!res.ok) throw new Error('Failed to delete');
                await fetchListings();
            } catch (error) {
                console.error(error);
                alert('Could not delete listing.');
            }
        }

        async function handleEdit(id) {
            const newTitle = prompt('Enter new title (leave blank to keep current):');
            const newPrice = prompt('Enter new price:');
            const newBrand = prompt('Enter new brand:');
            const newYear = prompt('Enter new year:');
            const newPhone = prompt('Enter contact phone:');
            const newFuelType = prompt('Enter fuel type (Electric, Petrol, Diesel, Hybrid):');

            const data = {};
            if (newTitle) data.title = newTitle;
            if (newPrice) data.price = Number(newPrice);
            if (newBrand) data.brand = newBrand;
            if (newYear) data.year = Number(newYear);
            if (newPhone) data.phone = newPhone;
            if (newFuelType) data.fuelType = newFuelType;

            if (Object.keys(data).length === 0) return;

            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_URL}/update-vehicle/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const body = await res.json().catch(() => null);
                    throw new Error(body?.message || 'Update failed');
                }
                alert('Vehicle updated successfully');
                await fetchListings();
            } catch (error) {
                console.error(error);
                alert('Could not update listing: ' + error.message);
            }
        }

        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); window.location.href = 'login.html'; };

        // Sync mobile logout button
        const mobileLogoutBtn = document.getElementById('logoutBtn-mobile');
        if (mobileLogoutBtn) {
            mobileLogoutBtn.onclick = () => { localStorage.removeItem('token'); window.location.href = 'login.html'; };
        }

        document.getElementById('refreshBtn').onclick = fetchListings;

        // ===== HAMBURGER MENU =====
        function setupHamburgerMenu() {
            const hamburger = document.getElementById('navbar-hamburger');
            const mobileMenu = document.getElementById('mobile-menu');
            if (!hamburger || !mobileMenu) return;

            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                mobileMenu.classList.toggle('active');
            });

            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    mobileMenu.classList.remove('active');
                });
            });
        }

        setTimeout(setupHamburgerMenu, 100);

        fetchListings();
    </script>
</body>
</html>
